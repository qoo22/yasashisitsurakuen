<title>やさしい失楽園 ── 完全版</title>
<style>
  *{ -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; }
  html,body{margin:0;padding:0;background:#000;width:100%;height:100%;
    position:fixed;inset:0;overflow:hidden;overscroll-behavior:none;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:"Courier New",monospace;color:#fff;
    -webkit-user-select:none;user-select:none;touch-action:none;}
  #wrap{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;height:100%;
    justify-content:center;box-sizing:border-box;}
  canvas{background:#000;image-rendering:pixelated;border:2px solid #1c1c1c;
    max-width:98vw;max-height:84vh;touch-action:none;display:block;}
  #hint{color:#666;font-size:12px;letter-spacing:1px;text-align:center;line-height:1.6;}
  #hint b{color:#bbb;}
  #pad{display:none;gap:24px;align-items:center;justify-content:space-between;
    width:100%;max-width:560px;padding:0 14px;box-sizing:border-box;user-select:none;}
  #dpad{display:grid;grid-template-columns:repeat(3,48px);grid-template-rows:repeat(3,48px);gap:5px;}
  .btn{background:#141414;border:2px solid #4a4a4a;color:#ddd;border-radius:10px;
    display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;
    user-select:none;touch-action:none;-webkit-user-select:none;}
  .btn:active{background:#363636;border-color:#888;}
  #acts{display:flex;gap:12px;}
  #acts .btn{width:84px;height:52px;font-size:15px;font-weight:bold;line-height:1.1;text-align:center;}
  #mbtn{ width:46px;height:46px;font-size:13px; }
  /* 全画面ボタン（タッチ端末のみ表示） */
  #fsbtn{ display:none; position:fixed; top:8px; right:8px; width:44px; height:44px;
    font-size:20px; z-index:60; opacity:0.82; }
  /* タッチ端末（スマホ・タブレット）レイアウト */
  @media (pointer:coarse){
    #wrap{ justify-content:space-between; padding:2px 0 8px; gap:4px; }
    #pad{ display:flex; }
    #hint{ display:none; }
    canvas{ max-width:100vw; max-height:75vh; }   /* たて: ギリギリまで 拡大・中央 */
    #fsbtn{ display:flex; }
  }
  /* 横向きスマホ: 中央に 大きく キャンバス、操作は 左、アクションは 右 */
  @media (pointer:coarse) and (orientation:landscape){
    #wrap{ flex-direction:row; justify-content:center; align-items:center; padding:0; }
    canvas{ max-width:100vw; max-height:100vh; }
    #pad{ position:fixed; inset:0; background:transparent; pointer-events:none; display:block; }
    #dpad{ position:fixed; left:10px; top:50%; transform:translateY(-50%); pointer-events:auto; }
    #acts{ position:fixed; right:10px; top:50%; transform:translateY(-50%);
      flex-direction:column; gap:12px; pointer-events:auto; }
  }

<body>
<div id="wrap">
  <canvas id="c" width="640" height="480"></canvas>
  <div id="hint">
    <b>↑↓←→</b> 移動・選択 &nbsp;|&nbsp; <b>Z / Enter</b> 決定・はなす &nbsp;|&nbsp; <b>X / Shift</b> もどる &nbsp;|&nbsp; <b>M</b> 音楽 ON/OFF<br>
    敵の攻撃ターンは <b>赤いハート</b> を動かして弾を避ける
  </div>
  <div id="pad">
    <div id="dpad">
      <span></span><div class="btn" data-k="ArrowUp">▲</div><span></span>
      <div class="btn" data-k="ArrowLeft">◀</div><div class="btn" id="mbtn" data-k="m">♪</div><div class="btn" data-k="ArrowRight">▶</div>
      <span></span><div class="btn" data-k="ArrowDown">▼</div><span></span>
    </div>
    <div id="acts"><div class="btn" data-k="x">もどる</div><div class="btn" data-k="z">けってい</div></div>
  </div>
  <div id="fsbtn" class="btn" title="全画面">⛶</div>
</div>
<script>
"use strict";
/* =========================================================================
   やさしい失楽園  ── 完全版 (The Gentle Paradise Lost · Full)
   オリジナルの物語・音楽・アート。設計思想はアンダーテール型。
   © 物語/楽曲はこのゲームのための完全オリジナル。
   ========================================================================= */

/* ---- 画像 (外部ファイル img/<name>.png を参照) ---- */
const IMG_KEYS = ["char_hone","char_kirari","char_wanda","char_kakuto","char_smoke","char_soyo","char_nemu","char_kasa","char_pachi","char_shizuku","char_kodama","char_neji","char_houki","char_homura","char_argor","char_argor_calm","char_argor_2","char_argor_atk","spear1","spear2","spear3","title_bg","room_gate","ending_light","ending_hollow","save_flame","bg_ruins","bg_water","bg_factory","char_smoke_big","bg_throne"];
const IMG = {};
for(const k of IMG_KEYS){ const im=new Image(); im.src="img/"+k+".png"; IMG[k]=im; }

const cv=document.getElementById('c'), ctx=cv.getContext('2d');
const W=cv.width,H=cv.height; ctx.textBaseline='top';
const IS_TOUCH = (window.matchMedia && window.matchMedia('(pointer:coarse)').matches) || ('ontouchstart' in window);

/* =======================  入力  ======================= */
const keys={}, pressed={};
function normKey(k){switch(k){
  case'ArrowUp':case'w':case'W':return'up';
  case'ArrowDown':case's':case'S':return'down';
  case'ArrowLeft':case'a':case'A':return'left';
  case'ArrowRight':case'd':case'D':return'right';
  case'z':case'Z':case'Enter':case' ':return'confirm';
  case'x':case'X':case'Shift':case'Backspace':return'cancel';
  case'm':case'M':return'mute';
}return null;}
function setKey(k,d){k=normKey(k);if(!k)return;if(d&&!keys[k])pressed[k]=true;keys[k]=d;}
window.addEventListener('keydown',e=>{const n=normKey(e.key);if(n){e.preventDefault();setKey(e.key,true);ensureAudio();if(n==='mute')toggleMute();}});
window.addEventListener('keyup',e=>setKey(e.key,false));
document.querySelectorAll('#pad .btn').forEach(b=>{const k=b.getAttribute('data-k');
  const dn=e=>{e.preventDefault();ensureAudio(); if(k==='m'){ toggleMute(); return; } setKey(k,true);};
  const up=e=>{e.preventDefault(); if(k==='m')return; setKey(k,false);};
  b.addEventListener('touchstart',dn,{passive:false});b.addEventListener('touchend',up,{passive:false});
  b.addEventListener('touchcancel',up,{passive:false});
  b.addEventListener('mousedown',dn);b.addEventListener('mouseup',up);b.addEventListener('mouseleave',up);});
function consume(k){if(pressed[k]){pressed[k]=false;return true;}return false;}
function clearPressed(){for(const k in pressed)pressed[k]=false;}
/* ===== タッチ操作（iPhone / Android）=====
   ・敵の攻撃ターン: キャンバス(=避けボックス)を なぞると ハートが 指に ついてくる（直感的）
   ・それ以外（会話・メニュー・攻撃バー）: 画面タップ＝けってい */
(function(){
  function pos(e){ const r=cv.getBoundingClientRect();
    const t=(e.touches&&e.touches[0])||(e.changedTouches&&e.changedTouches[0])||e;
    return { x:(t.clientX-r.left)*(W/r.width), y:(t.clientY-r.top)*(H/r.height) }; }
  const dodge=()=> typeof state!=='undefined' && (state===ST.ENEMY || state===ST.TUTORIAL);
  function down(e){ e.preventDefault(); ensureAudio(); const p=pos(e);
    if(dodge()){ soul.touch=true; soul.tx=p.x; soul.ty=p.y; }
    else { pressed.confirm=true; } }                 // タップ＝けってい
  function move(e){ if(dodge() && soul.touch){ e.preventDefault(); const p=pos(e); soul.tx=p.x; soul.ty=p.y; } }
  function up(e){ if(e&&e.preventDefault)e.preventDefault(); soul.touch=false; }
  cv.addEventListener('touchstart',down,{passive:false});
  cv.addEventListener('touchmove',move,{passive:false});
  cv.addEventListener('touchend',up,{passive:false});
  cv.addEventListener('touchcancel',up,{passive:false});
  cv.addEventListener('mousedown',down);
  cv.addEventListener('mousemove',e=>{ if(e.buttons) move(e); });
  window.addEventListener('mouseup',up);
})();
/* タブを 閉じ／戻し したり、画面を 再表示したとき 音が 止まったままに ならない ように 再開。
   バックグラウンドで AudioContext が suspend されると 元の音源が 無音化するので、
   復帰時(force)は 現在のテーマを 鳴らし直す（curTheme が null＝無音区間なら 何もしない）。 */
function resumeAudio(force){
  try{ if(AC && AC.state==='suspended') AC.resume(); }catch(e){}
  if(!curTheme) return;                 // stopMusic中(無音演出)は 復活させない
  if(force){ curBgmFile=null; stopBgmSource(); playBgmFor(curTheme); }   // 確実に 鳴らし直す
  else { kickBgm(); }
}
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) resumeAudio(true); });
window.addEventListener('pageshow',()=>resumeAudio(true));
window.addEventListener('focus',()=>resumeAudio(false));
/* 全画面（横画面で ブラウザのタブ／バーを 隠す）。Androidや一般ブラウザで 有効。
   iOS Safariは div全画面 非対応のため、ホーム画面に追加すると 全画面になる。 */
(function(){
  const fs=document.getElementById('fsbtn'); if(!fs) return;
  function toggle(e){ if(e){e.preventDefault(); e.stopPropagation();} ensureAudio();
    const d=document, el=d.documentElement;
    const isFS = d.fullscreenElement||d.webkitFullscreenElement;
    try{
      if(!isFS){ (el.requestFullscreen||el.webkitRequestFullscreen||el.webkitRequestFullScreen||function(){}).call(el); }
      else { (d.exitFullscreen||d.webkitExitFullscreen||function(){}).call(d); }
    }catch(err){}
  }
  fs.addEventListener('click',toggle);
  fs.addEventListener('touchend',toggle,{passive:false});
})();

/* =======================  音楽エンジン  =======================
   BGMは Hugging Face(MusicGen)で 生成した mp3 を music/ フォルダから 再生する。
   効果音(SE)と 会話ボイスは ひきつづき Web Audio で 合成する。
*/
let AC=null, masterGain=null, bgmGain=null, voiceGain=null, muted=false, curTheme=null, sched=null;
let bgmEl=null, curBgmFile=null, bgmSource=null; const musicBuffers={};
/* テーマ名 → 楽曲ファイル の マッピング */
const BGM={
  _default:'music/explore.mp3',
  title:'music/title.mp3',
  // 道中(非戦闘)BGM: 場所ごとに「温度」をかえた、余白おおめの 雰囲気曲
  explore:'music/explore.mp3', ruins:'music/explore.mp3',   // 遺跡: さびしく なつかしい
  water:'music/area_water.mp3',                              // 水路: しめった神秘・しずく
  theater:'music/area_theater.mp3',                          // 劇場: 色あせたワルツ
  factory:'music/area_factory.mp3',                          // 工場: 静かで不穏な機械
  peace:'music/hopeful.mp3',
  hone:'music/battle.mp3', kirari:'music/battle.mp3', wanda:'music/battle.mp3',
  boss:'music/boss.mp3', kakuto:'music/boss.mp3',
  smoke:'music/dark.mp3',
  // モンスター別 戦闘曲（enemy.key を テーマ名として 使う）
  char_soyo:'music/m_soyo.mp3', char_nemu:'music/m_nemu.mp3', char_hone:'music/m_hone.mp3',
  char_kasa:'music/m_kasa.mp3', char_pachi:'music/m_pachi.mp3', char_kirari:'music/m_kirari.mp3',

  char_neji:'music/m_neji.mp3', char_houki:'music/m_houki.mp3', char_kakuto:'music/m_kakuto.mp3',
  char_homura:'music/homura_boss.mp3',   // ホムラ戦: 別れの戦い

/* BGM: できれば Web Audio の AudioBufferSource を loop=true で 鳴らす（サンプル精度＝継ぎ目なし）。
   http配信では これが 使える。file:// 等で fetch が だめな時は <audio>要素に フォールバック。 */
function bgmAudio(){
  if(!bgmEl){ try{ bgmEl=new Audio(); bgmEl.loop=true; bgmEl.preload='auto'; }catch(e){ bgmEl=null; return null; } }
  if(bgmEl) bgmEl.volume = muted?0:0.6;
  return bgmEl;
}
function ensureAudio(){
  if(!AC){
    try{
      AC=new (window.AudioContext||window.webkitAudioContext)();
      masterGain=AC.createGain(); masterGain.gain.value=muted?0:0.16; masterGain.connect(AC.destination); // 効果音用
      bgmGain=AC.createGain();    bgmGain.gain.value=muted?0:0.28;  bgmGain.connect(AC.destination);       // BGM用（会話が 聞こえるよう 控えめ）
      voiceGain=AC.createGain();  voiceGain.gain.value=muted?0:0.85; voiceGain.connect(AC.destination);     // 会話音（ボイスブリップ）用・BGMより 前に出す
      try{ const b=AC.createBuffer(1,1,22050); const s=AC.createBufferSource(); s.buffer=b; s.connect(AC.destination); s.start(0); }catch(e){}
    }catch(e){ AC=null; }
  }
  if(AC && AC.state==='suspended') AC.resume();
  kickBgm();   // ユーザー操作の 中で BGMの 再生を 開始/再開する
}
function kickBgm(){
  // curTheme が ある ときだけ 再開する。stopMusic()で 止めた(curTheme=null)場合は
  // キー入力で ensureAudio→kickBgm が 呼ばれても 無音を 保つ（古い<audio>を 復活させない）。
  if(curTheme){ playBgmFor(curTheme); }
}
function toggleMute(){ muted=!muted;
  if(masterGain) masterGain.gain.value=muted?0:0.16;
  if(bgmGain) bgmGain.gain.value=muted?0:0.28;
  if(voiceGain) voiceGain.gain.value=muted?0:0.85;
  if(bgmEl) bgmEl.volume=muted?0:0.32;
}
function stopBgmSource(){
  if(bgmSource){ try{ bgmSource.stop(); bgmSource.disconnect(); }catch(e){} bgmSource=null; }
  if(bgmEl){ try{ bgmEl.pause(); }catch(e){} }
}
function loadBuffer(file){
  if(musicBuffers[file]) return Promise.resolve(musicBuffers[file]);
  return fetch(file).then(r=>r.arrayBuffer()).then(ab=>new Promise((res,rej)=>{
    AC.decodeAudioData(ab, b=>{ musicBuffers[file]=b; res(b); }, rej);
  }));
}
function htmlBgm(file,noloop){
  const el=bgmAudio(); if(!el) return;
  if(el.getAttribute('data-f')!==file){ el.src=file; el.setAttribute('data-f',file); }
  el.loop=!noloop;
  el.volume=muted?0:0.32;
  const p=el.play(); if(p&&p.catch)p.catch(()=>{});
}
function playBgmFile(file,noloop){
  if(!file) return;
  if(curBgmFile===file && (bgmSource || (bgmEl && !bgmEl.paused))) return;  // 同じ曲を再生中
  curBgmFile=file;
  if(AC){
    loadBuffer(file).then(buf=>{
      if(curBgmFile!==file) return;                  // 読み込み中に 別の曲へ
      stopBgmSource();
      const s=AC.createBufferSource(); s.buffer=buf; s.loop=!noloop;  // ★ noloop時は 1回だけ
      s.connect(bgmGain); s.start(0); bgmSource=s;
    }).catch(()=>{ htmlBgm(file,noloop); });          // fetch/デコード 失敗時は <audio>へ
  } else { htmlBgm(file,noloop); }
}
function playBgmFor(name,noloop){ playBgmFile(BGM[name] || BGM._default, noloop); }
function midi(n){ return 440*Math.pow(2,(n-69)/12); }
function blip(freq,dur,type,vol,t0){
  if(!AC||muted) return;
  const t=t0||AC.currentTime;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type||'square'; o.frequency.value=freq;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol||0.5,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+dur+0.02);
}

function se(kind){
  if(!AC||muted)return; const t=AC.currentTime;
  if(kind==='select') blip(660,0.05,'square',0.3,t);
  else if(kind==='confirm'){ blip(880,0.05,'square',0.35,t); blip(1320,0.05,'square',0.25,t+0.05); }
  else if(kind==='cancel') blip(330,0.06,'square',0.3,t);
  else if(kind==='hit'){ blip(160,0.12,'square',0.5,t); blip(110,0.12,'sawtooth',0.3,t); }
  else if(kind==='hurt'){ blip(200,0.15,'sawtooth',0.5,t); blip(150,0.2,'square',0.4,t+0.02); }
  else if(kind==='heal'){ blip(880,0.1,'triangle',0.4,t); blip(1320,0.12,'triangle',0.3,t+0.08); }
  else if(kind==='spare'){ [659,784,988,1319].forEach((f,i)=>blip(f,0.18,'triangle',0.35,t+i*0.09)); }
  else if(kind==='text') blip(740,0.02,'square',0.12,t);
  else if(kind==='save'){ [523,659,784,1047].forEach((f,i)=>blip(f,0.25,'triangle',0.3,t+i*0.12)); }
  else if(kind==='break'){ // MERCY破壊: 鈍い金属音＋下降
    blip(220,0.25,'sawtooth',0.55,t); blip(110,0.35,'square',0.5,t+0.02);
    blip(70,0.5,'sawtooth',0.45,t+0.06);
    const o=AC.createGain();o.gain.setValueAtTime(0.18,t);o.gain.exponentialRampToValueAtTime(0.0001,t+0.3);
    const bs=AC.createBufferSource();const buf=AC.createBuffer(1,4096,AC.sampleRate);const d=buf.getChannelData(0);
    for(let i=0;i<4096;i++)d[i]=(Math.random()*2-1)*(1-i/4096); bs.buffer=buf; bs.connect(o);o.connect(masterGain);bs.start(t);bs.stop(t+0.3);
  }
  else if(kind==='shatter'){ // ハートが割れる: ガラスの破裂＋下降
    blip(1200,0.06,'square',0.4,t); blip(820,0.08,'square',0.35,t+0.01); blip(300,0.3,'sawtooth',0.4,t+0.03);
    const o=AC.createGain();o.gain.setValueAtTime(0.3,t);o.gain.exponentialRampToValueAtTime(0.0001,t+0.5);
    const bs=AC.createBufferSource();const buf=AC.createBuffer(1,8192,AC.sampleRate);const d=buf.getChannelData(0);
    for(let i=0;i<8192;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/8192,2); bs.buffer=buf; bs.connect(o);o.connect(masterGain);bs.start(t);bs.stop(t+0.5);
  }
  else if(kind==='boom'){ // 変身: 重く ひびく 低音「ブーン」
    const o=AC.createOscillator(), g=AC.createGain();
    o.type='sine'; o.frequency.setValueAtTime(70,t); o.frequency.exponentialRampToValueAtTime(38,t+0.9);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.7,t+0.05); g.gain.exponentialRampToValueAtTime(0.0001,t+1.1);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+1.2);
    const o2=AC.createOscillator(), g2=AC.createGain();   // うなり
    o2.type='triangle'; o2.frequency.setValueAtTime(48,t); o2.frequency.exponentialRampToValueAtTime(30,t+0.9);
    g2.gain.setValueAtTime(0.0001,t); g2.gain.exponentialRampToValueAtTime(0.4,t+0.06); g2.gain.exponentialRampToValueAtTime(0.0001,t+1.0);
    o2.connect(g2); g2.connect(masterGain); o2.start(t); o2.stop(t+1.1);
  }
  else if(kind==='whoosh'){ // 変身／槍を投げる: 風切り「ぶおんっ」
    const dur=0.55;
    // 帯域ノイズの スウィープ（風切り）
    const n=Math.floor(AC.sampleRate*dur), buf=AC.createBuffer(1,n,AC.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<n;i++){ const k=i/n; d[i]=(Math.random()*2-1)*Math.sin(Math.PI*k); } // 中央が ふくらむ
    const bs=AC.createBufferSource(); bs.buffer=buf;
    const bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=0.7;
    bp.frequency.setValueAtTime(180,t);
    bp.frequency.exponentialRampToValueAtTime(950,t+0.16);
    bp.frequency.exponentialRampToValueAtTime(110,t+dur);
    const gN=AC.createGain();
    gN.gain.setValueAtTime(0.0001,t); gN.gain.exponentialRampToValueAtTime(0.55,t+0.06); gN.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    bs.connect(bp); bp.connect(gN); gN.connect(masterGain); bs.start(t); bs.stop(t+dur);
    // 低い うなり（ぶおーん）
    const o=AC.createOscillator(), g=AC.createGain(); o.type='sawtooth';
    o.frequency.setValueAtTime(170,t); o.frequency.exponentialRampToValueAtTime(55,t+dur);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.42,t+0.05); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+dur+0.02);
  }
  else if(kind==='dread'){ // 槍が あらわれる: 低音を 重ねた こわい うなり「ぶ゛ーーん」
    const dur=1.1;
    // 低い うなり 3層（わずかに デチューンして 濁らせ、ゆっくり 立ち上がる）
    [39, 52, 78].forEach((f,i)=>{
      const o=AC.createOscillator(), g=AC.createGain();
      o.type = (i===2)?'sawtooth':'triangle';
      o.frequency.setValueAtTime(f*(1+i*0.01), t);
      o.frequency.linearRampToValueAtTime(f*0.82, t+dur);
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(0.42-i*0.07, t+0.30);   // じわっと 迫る
      g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
      o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+dur+0.02);
    });
    // ざらついた 低ノイズ（不気味さ）
    const n=Math.floor(AC.sampleRate*dur), buf=AC.createBuffer(1,n,AC.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<n;i++){ const k=i/n; d[i]=(Math.random()*2-1)*Math.min(1,k/0.3)*(1-k)*0.5; }
    const bs=AC.createBufferSource(), lp=AC.createBiquadFilter(), gn=AC.createGain();
    lp.type='lowpass'; lp.frequency.value=380; gn.gain.value=0.3;
    bs.buffer=buf; bs.connect(lp); lp.connect(gn); gn.connect(masterGain); bs.start(t); bs.stop(t+dur);
  }
  else if(kind==='don'){ // みのがすに ぶつかった「ドンっ」: 太い低音の 打撃 ＋ クリック
    const o=AC.createOscillator(), g=AC.createGain();
    o.type='sine'; o.frequency.setValueAtTime(190,t); o.frequency.exponentialRampToValueAtTime(42,t+0.18);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.95,t+0.005); g.gain.exponentialRampToValueAtTime(0.0001,t+0.38);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.42);
    const o2=AC.createOscillator(), g2=AC.createGain();   // より低い 余韻
    o2.type='triangle'; o2.frequency.setValueAtTime(95,t); o2.frequency.exponentialRampToValueAtTime(28,t+0.32);
    g2.gain.setValueAtTime(0.0001,t); g2.gain.exponentialRampToValueAtTime(0.6,t+0.01); g2.gain.exponentialRampToValueAtTime(0.0001,t+0.55);
    o2.connect(g2); g2.connect(masterGain); o2.start(t); o2.stop(t+0.58);
    const n=Math.floor(AC.sampleRate*0.05), buf=AC.createBuffer(1,n,AC.sampleRate), d=buf.getChannelData(0);  // アタックの クリック
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
    const bs=AC.createBufferSource(), gn=AC.createGain(); bs.buffer=buf; gn.gain.value=0.5;
    bs.connect(gn); gn.connect(masterGain); bs.start(t); bs.stop(t+0.05);
  }
}

function currentVoice(){
  if(state===ST.ARGORCUT) return VOICES.char_argor;
  if(state===ST.GAMEOVER) return VOICES.voice;
  if(state===ST.CUT) return VOICES[cut.img] || VOICES.narrator; // 画像キー＝話者
  if(dialogReturnWalk) return VOICES.narrator;                   // 探索中の地の文
  if(enemy && VOICES[enemy.key]) return VOICES[enemy.key];       // 戦闘中は その敵の声
  return VOICES.narrator;
}
function voiceBlip(v){
  if(!AC||muted||!v||!voiceGain) return; const t=AC.currentTime;
  let f=v.freq;
  if(!v.fixed) f*=(0.95+Math.random()*0.1);   // 少し ゆらす（人間味）
  if(v.wob) f*=(0.72+Math.random()*0.5);       // 不安定に 大きく ゆらす（不気味）
  const dur=v.dur||0.03, vol=v.vol||0.12;
  // 主音
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=v.type||'square'; o.frequency.value=f;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol,t+0.004);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(voiceGain); o.start(t); o.stop(t+dur+0.02);
  // 丸み: 1oct下の正弦を薄く重ね 太く まろやかに（王・母）
  if(v.round){
    const o2=AC.createOscillator(), g2=AC.createGain();
    o2.type='sine'; o2.frequency.value=f*0.5;
    g2.gain.setValueAtTime(0.0001,t);
    g2.gain.exponentialRampToValueAtTime(vol*0.55,t+0.005);
    g2.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o2.connect(g2); g2.connect(voiceGain); o2.start(t); o2.stop(t+dur+0.02);
  }
  // ノイズ: 濁った 壊れた音（本性ケムリ）
  if(v.noise){
    const n=Math.max(1,Math.floor(AC.sampleRate*dur));
    const buf=AC.createBuffer(1,n,AC.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
    const bs=AC.createBufferSource(), gn=AC.createGain();
    bs.buffer=buf; gn.gain.value=vol*0.6; bs.connect(gn); gn.connect(voiceGain);
    bs.start(t); bs.stop(t+dur);
  }
}

{ key:'char_argor', name:'灰冠の王 アルゴール', shortName:'アルゴール', maxhp:200,hp:200,atk:7, boss:true, final:true, theme:'argor',

    {label:'おもいだす',text:'あなたは、たびで であった みんなを 思い出した。\nホネくん。キラリ。ワンダ。── みんなの 顔。\n王の 槍が、わずかに さがった。\nぼうぎょが、少し ゆるんだ。',
      effect:e=>{ e.dmgUp=Math.min(2.0,(e.dmgUp||1)+0.35); }},
  ],
  attack(b){
    const box=b.box;

    const spInt=ph===1?72:(ph===2?60:52);
    if(b.t%spInt===10){ const n=ph===1?1:2;
      for(let k=0;k<n;k++){ const cx=box.x+18+Math.random()*(box.w-36);
        b.bullets.push({x:cx-5,y:-99999,w:10,h:24,warn:32,active:false,vy:0,off:true,cx,

          draw(c){ if(!this.active){ c.globalAlpha=0.4;c.strokeStyle='#fff';c.lineWidth=2;c.beginPath();c.moveTo(this.cx,box.y);c.lineTo(this.cx,box.y+box.h);c.stroke();c.globalAlpha=1; }

    // 壊れた玉座（破片）ph2+
    if(ph>=2 && b.t%26===13){ const x=box.x+10+Math.random()*(box.w-20);
      b.bullets.push({x,y:box.y-8,r:5,vy:2.0*soft,vx:(Math.random()-0.5)*1.2,

    // 沈黙の一撃 ph3
    if(ph===3 && b.t%96===40){ flash=8; const yy=box.y+(Math.random()<.5?box.h*0.34:box.h*0.66);
      b.bullets.push({x:box.x+box.w+20,y:yy-8,w:box.w+44,h:16,vx:-9*soft,off:true,
        upd(){ this.x+=this.vx; }, draw(c){ c.fillStyle='#fff';c.fillRect(this.x,this.y,this.w,this.h); }}); }
  },
  turnFrames:340},

function drawStar(c,cx,cy,sp,outer,inner,rot){c.fillStyle='#fff';c.beginPath();
  for(let i=0;i<sp*2;i++){const r=i%2===0?outer:inner,a=rot+i*Math.PI/sp,x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;i===0?c.moveTo(x,y):c.lineTo(x,y);}
  c.closePath();c.fill();}

/* =======================  シナリオ（探索 & カットシーン）  ======================= */
/* 進行は STORY 配列（ステップ）で管理。各ステップは終了時に advance() を呼ぶ */
let STORY=[]; let seqPos=0; let curPlace='';
function advance(){ seqPos++; runSeq(); }
function runSeq(){ const st=STORY[seqPos]; if(!st)return; if(st.label)curPlace=st.label; st.run(); }

/* ---- カットシーン: 画像 + ナレーション ページ ---- */
let cut={img:null, pages:[], idx:0, after:null, choice:null, dark:0.55, sprite:null};
function cutscene(img,pages,after,opt){
  // 1画面=最大2行に なるよう 各ページを 分割（カット枠 幅 W-80, 17px）
  const flat=[]; for(const p of pages){ for(const q of paginate2(p, (W-80)-36, '17px "Courier New",monospace')) flat.push(q); }
  cut.img=img; cut.pages=flat; cut.idx=0; cut.after=after||advance;
  cut.choice=(opt&&opt.choice)||null; cut.dark=(opt&&opt.dark!=null)?opt.dark:0.55;
  cut.sprite=(opt&&opt.sprite)||null;   // 中央に 立つ キャラ画像（任意）
  cutText=''; cutShown=0; loadPage();
  state=ST.CUT; clearPressed();
}
let cutText='',cutShown=0;
function loadPage(){ cutText=cut.pages[cut.idx]||''; cutShown=0; }

      : ['けむりが、すうっと たちのぼる。','「……みのがした? あの ホネを?」','「ふうん。はなしを きいて やった、ねえ。\n  ……やさしいね。ほんとうに」','「でも おぼえて おきな。\n  やさしさは、いつか きみを\n  おいつめる かも しれないよ」'];
  } else if(idx===1){ // キラリの あと
    pages = lastKilled
      ? ['「ふたり目。なれて きた みたいだね」','「いい かおに なって きた。\n  ためらいが、きえて きてる」','「そう、それで いい。\n  なさけは、おもいだけ さ。\n  すてて しまえば、らくに なる」',
         (killedSoFar>=2?'「……このまま いけば、\n  きみは とても、つよく なる。\n  だれも、きみを とめられない くらいに」':'')]
      : ['「また みのがした。\n  ……きみ、ほんきで そんな やりかたで\n  帰れる と おもってる?」','「ぼくには わからないな。\n  たすけても、きみには 一円にも ならない のに」',

  } else { // ワンダの あと（緊張が高まる）
    if(killedSoFar>=3){ pages=['けむりが、いつもより こく、たちこめる。','「……すごいね。ぜんぶ、けした」','「もう この あたりに、いきものは いない。\n  しずかだ。きみの ための しずけさ だ」','「ねえ。ぼく、ずっと きみを 見てた。\n  ……きみ、もう ぼくと、おなじ 目を してる」','「さあ、おいで。とびらの 番人が\n  まってる。さいごの ひとり だ」']; }
    else if(sparedSoFar>=3){ pages=['けむりが、なんだか いつもより うすい。','「……ぜんぶ、みのがしたね」','「ひとりも、たおさずに。\n  EXP も、ほとんど ない のに」','「……ぼくには、まだ わからない。\n  きみが、なにを しようと してるのか」','「でも ── すこし だけ。\n  見て いたいと、おもって しまった よ」']; }
    else { pages=['けむりが、すうっと たちのぼる。','「たおした やつも、みのがした やつも いる、か」','「きみは、まよって いるね。\n  ……それは、よわさ? それとも」','「ま、いいさ。\n  とびらの 番人が、さいごに まってる。\n  きみが どっち なのか ── そこで わかる」']; }
  }
  pages = pages.filter(p=>p);
  playTheme(killedSoFar>sparedSoFar?'hollow':'explore');
  cutscene('char_smoke', pages, ()=>advance(), {dark:0.55});
}

/* ---- エンディング ---- */
function sceneEnding(){
  clearSave(); // クリアしたら セーブを消す（次は さいしょから）
  const k=player.kills, s=player.spares, total=enemies.length;
  const argorSpared = !!flags.argorSpared;               // 王を 救ったか（撃破後に てを さしのべたか）
  const kakutoSpared = enemies[11] && enemies[11].hp>0;
  /* ── 6つの 結末に 分岐 ── */
  if(k===0)            endTruePacifist();                 // ① 真・やさしい
  else if(k>=total)    endGenocide();                     // ② むなしい（全滅）
  else if(k>=8)        endSmokeConsumed(k,s);             // ③ ケムリに のまれかけ
  else if(!argorSpared)endKingFallen(k,s);               // ④ 王を 討った
  else if(s>=9)        endKingSaved(k,s);                 // ⑤ 王を 救った（ほぼ平和）
  else                 endNeutral(k,s,kakutoSpared);     // ⑥ まじりあう
}

function smokeStage(n){
  const k=player.kills, s=player.spares; let pages;
  if(n===0){
    pages = k>s
      ? ['けむりが、すうっと たちのぼる。','「くくっ。やって きたね。\n  まち跡の やつら、よわかった だろ?」','「やさしさ? あんなの、すきだらけ さ。\n  ……いい ちょうしだ。つづけな」']

  } else if(n===1){
    pages = k>s
      ? ['「劇場街も、しずかに なったね」','「いい かおに なって きた。\n  ためらいが、きえて きてる」','「なさけは おもいだけ さ。\n  すてて しまえば、らくに なる」']
      : ['「また、ぜんぶ みのがした」','「ぼくには わからないな。\n  たすけても、きみには 一円にも ならない のに」','「……でも。あいつら、きみの こと\n  ずっと わすれない だろうね」'];
  } else if(n===2){
    pages = k>s
      ? ['けむりが、いつもより こく たちこめる。','「しずくの ほらあなも、からっぽ だ」','「ねえ。ぼく、ずっと きみを 見てた。\n  ……きみ、もう ぼくと、おなじ 目を してる」']
      : ['けむりが、なんだか いつもより うすい。','「ぜんぶ、みのがしたね。\n  EXP も、ほとんど ない のに」','「……ぼくには まだ わからない。\n  でも ── すこし だけ、\n  見て いたいと、おもって しまった よ」'];
  } else {

const tut={ orb:null };
function smokeTutorial(){
  playTheme('explore');
  const moveHint = IS_TOUCH ? '下の ボックスを ゆびで なぞる' : 'やじるしキー(↑↓←→)で うごく';
  cutscene('char_smoke',[

    '「ようこそ、ちかの せかいへ！\n  ぼくが あそびかたを おしえて あげる」',
    '「うごきかたは、かんたん。\n  '+moveHint+' だけ だよ」',
    '「そこに『ともしびの かけら』が あるでしょ?\n  ともだちに なる ための、しんせつな ひかり」',
    '「さあ ── ハートを うごかして、\n  その ひかりに ふれて ごらん?」',
  ], ()=>startSmokeTut(), {dark:0.5});
}
function startSmokeTut(){
  bphase.box={x:W/2-110,y:255,w:220,h:135};
  soul.x=bphase.box.x+26; soul.y=bphase.box.y+bphase.box.h/2; soul.invuln=0; soul.touch=false;
  tut.orb={ x:bphase.box.x+bphase.box.w-32, base:bphase.box.y+bphase.box.h/2, y:bphase.box.y+bphase.box.h/2, ph:0, r:9, got:false };
  state=ST.TUTORIAL; clearPressed();
}
function updateTutorial(){
  const box=bphase.box, o=tut.orb; if(!o)return; const pad=6;
  let mvx=0,mvy=0;
  if(soul.touch){ const tx=Math.max(box.x+pad,Math.min(box.x+box.w-pad,soul.tx)), ty=Math.max(box.y+pad,Math.min(box.y+box.h-pad,soul.ty));
    mvx=tx-soul.x; mvy=ty-soul.y; soul.x+=mvx*0.55; soul.y+=mvy*0.55; }
  else { const sp=2.7; if(keys.left)mvx-=sp;if(keys.right)mvx+=sp;if(keys.up)mvy-=sp;if(keys.down)mvy+=sp; soul.x+=mvx; soul.y+=mvy; }
  soul.x=Math.max(box.x+pad,Math.min(box.x+box.w-pad,soul.x));
  soul.y=Math.max(box.y+pad,Math.min(box.y+box.h-pad,soul.y));
  o.ph+=0.05; o.y=o.base+Math.sin(o.ph)*10;   // かけらは ふわふわ
  const dx=soul.x-o.x, dy=soul.y-o.y;
  if(!o.got && dx*dx+dy*dy < (o.r+7)*(o.r+7)){ o.got=true; soul.touch=false; smokeBetray2(); }  // 触れた瞬間 裏切り
}
function drawTutorial(){
  drawImgCover(IMG.char_smoke, 0.6);
  txt('* ケムリ', W/2, 26, 16, '#fff','center');
  const b=bphase.box; ctx.strokeStyle='#fff'; ctx.lineWidth=3; ctx.strokeRect(b.x,b.y,b.w,b.h);
  // ともしびの かけら（ひかる 玉）
  const o=tut.orb; if(o){
    ctx.save(); ctx.globalCompositeOperation='lighter';
    for(let i=3;i>=1;i--){ ctx.fillStyle='rgba(255,235,150,'+(0.12*i)+')'; ctx.beginPath(); ctx.arc(o.x,o.y,o.r+i*4,0,7); ctx.fill(); }
    ctx.fillStyle='#fff6c8'; ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,7); ctx.fill(); ctx.restore();
  }
  drawHeart(soul.x, soul.y, '#f00', 6);
  txt(IS_TOUCH?'ボックスを なぞって、ひかりに ふれよう':'やじるしで うごいて、ひかりに ふれよう', W/2, b.y+b.h+14, 13, '#bcbcbc','center');
}

/* =======================  探索（ウォーク）ルーム  ======================= */
const room={cfg:null, px:60, py:240, anim:0, near:null};
function makeWalkRoom(cfg){
  room.cfg=cfg; room.px=60; room.py=240; room.anim=0; room.near=null;
  room.saved=false;
  state=ST.WALK; clearPressed();
  // ルームに入った時のタイトル表示
  roomBanner=cfg.title||''; roomBannerT=160;
}
let roomBanner='',roomBannerT=0;
function updateWalk(){
  const c=room.cfg; if(!c)return;
  const sp=3; let mvx=0,mvy=0;
  if(keys.left)mvx-=sp; if(keys.right)mvx+=sp; if(keys.up)mvy-=sp; if(keys.down)mvy+=sp;
  room.px+=mvx; room.py+=mvy;
  room.px=Math.max(40,Math.min(W-40,room.px)); room.py=Math.max(120,Math.min(H-90,room.py));
  if(mvx||mvy) room.anim+=0.2;
  if(roomBannerT>0)roomBannerT--;
  // 近接判定
  room.near=null;
  for(const n of c.npcs||[]){ if(Math.hypot(room.px-n.x,room.py-n.y)<46){ room.near={type:'npc',obj:n}; } }
  if(c.saveAt && Math.hypot(room.px-c.saveAt.x,room.py-c.saveAt.y)<46){ room.near={type:'save'}; }
  // 出口（右はし）
  const exitX=W-50;
  if(room.px>exitX-10){ room.near={type:'exit'}; }
  if(consume('confirm') && room.near){
    if(room.near.type==='npc'){ se('confirm'); say(splitLines(room.near.obj.lines.join('\n')),()=>{state=ST.WALK;clearPressed();},true); }
    else if(room.near.type==='save'){ se('save'); doSave(); }
    else if(room.near.type==='exit'){ se('confirm'); const ex=c.onExit;
      if(c.exitText){ say(splitLines(c.exitText),()=>{ ex&&ex(); },true); } else { ex&&ex(); } }
  }
}
function doSave(){
  player.hp=player.maxhp;
  const okSave=saveGame();
  const msg = okSave
    ? ['ともしびに ふれた。','けつい が、こころに ともる。','(HPが かいふくした。\n ここまでの すすみを ほぞんした。\n つぎに ひらいた とき「つづきから」\n えらべる)']
    : ['ともしびに ふれた。','けつい が、こころに ともる。','(HPは かいふくしたが、\n この ブラウザでは ほぞんが\n できなかった……)'];
  say(msg,()=>{state=ST.WALK;clearPressed();},true);
}
function drawWalk(){
  const c=room.cfg;
  // 背景
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  if(c.bg && IMG[c.bg]) drawImgCover(IMG[c.bg], 0.72);
  // ゆかの格子（地下っぽさ）
  ctx.strokeStyle=c.bg?'#1a1a1a':'#0d0d0d'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,110);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=110;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.strokeStyle='#222'; ctx.lineWidth=2; ctx.strokeRect(20,108,W-40,H-118);
  // 出口の矢印
  ctx.fillStyle=(room.near&&room.near.type==='exit')?'#ff3':'#555';
  txt('▶',W-40,H/2-20,28,(room.near&&room.near.type==='exit')?'#ff3':'#555','center');
  txt('みち',W-40,H/2+12,12,'#555','center');
  // NPC
  for(const n of c.npcs||[]){
    ctx.fillStyle='#888'; ctx.fillRect(n.x-12,n.y-16,24,30);
    ctx.fillStyle='#bbb'; ctx.fillRect(n.x-10,n.y-14,20,10);
    txt(n.label,n.x,n.y+18,11,(room.near&&room.near.obj===n)?'#ff3':'#888','center');
  }
  // セーブポイント（ともしび）
  if(c.saveAt){ const f=c.saveAt; const fl=Math.sin(Date.now()*0.01)*3;
    ctx.fillStyle=(room.near&&room.near.type==='save')?'#ff6':'#fc3';
    ctx.beginPath(); ctx.ellipse(f.x,f.y+fl,7,12,0,0,7); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(f.x,f.y+4+fl,3,6,0,0,7); ctx.fill();
    txt('ともしび',f.x,f.y+22,11,(room.near&&room.near.type==='save')?'#ff6':'#a80','center'); }
  // プレイヤー（ハート）
  const bob=Math.sin(room.anim)*2;
  drawHeart(room.px,room.py+bob,'#f00',7);
  // 操作ヒント
  if(room.near){ const m=room.near.type==='exit'?'すすむ':room.near.type==='save'?'ともしびに ふれる':'しらべる';
    txt('Z: '+m,room.px,room.py-26,12,'#ff3','center'); }
  // バナー
  if(roomBannerT>0){ ctx.globalAlpha=Math.min(1,roomBannerT/40); txt('── '+roomBanner+' ──',W/2,60,20,'#fff','center'); ctx.globalAlpha=1; }
  // 下部ヒント
  txt('↑↓←→ あるく   Z しらべる/すすむ',W/2,H-24,12,'#555','center');
}

const ST={TITLE:'title',CUT:'cut',WALK:'walk',MENU:'menu',SUB:'sub',FIGHTBAR:'fightbar',DIALOG:'dialog',ENEMY:'enemy',RESULT:'result',GAMEOVER:'gameover',ARGORCUT:'argorcut',TUTORIAL:'tutorial'};
let state=ST.TITLE;

/* 行動選択中ずっと 戦闘ボックスに のこす「いまの 状況・表情」テキスト。
   戦闘に入った とき と 毎ターン 必ず 更新し、メニュー表示中に 見えつづける。 */
let battleMsg='';
function battleStatus(e){
  if(!e) return '';
  const pick=a=>(a&&a.length)? a[(Math.random()*a.length)|0] : null;
  // みのがせる ように なったら、ひらいた こころ（キャラ別・ユーモアつき）を 見せる
  if(e.spareReady){
    const sf=pick(e.spareFlavor);
    if(sf) return sf;
    if(!e.boss) return e.name+'は、すっかり こころを ひらいて いる。';
  }
  return pick(e.flavor) || (e.name+'が、こちらを じっと 見て いる。');
}

/* テキストを「1画面=最大2行」に 分割する（読みやすさ最優先）。
   ctx.measureText で 実際の 折り返しを 計算し、先頭の「* 」ぶんの 余白も 確保する。 */
function wrapToLines(text, maxw, font){
  ctx.save(); ctx.font=font;
  const room=maxw-ctx.measureText('* ').width;   // 各行 先頭の「* 」/インデントぶん
  const lines=[];
  for(const seg of String(text).split('\n')){
    let line='';
    for(const ch of seg){ const t=line+ch;
      if(line && ctx.measureText(t).width>room){ lines.push(line); line=ch; } else line=t; }
    lines.push(line);
  }
  ctx.restore();
  return lines;
}
function paginate2(text, maxw, font){
  const lines=wrapToLines(text, maxw, font), pages=[];
  for(let i=0;i<lines.length;i+=2) pages.push(lines.slice(i,i+2).join('\n'));
  return pages.length?pages:[''];
}
function say(lines,after,fromWalk){
  dialogReturnWalk=!!fromWalk;
  const arr=Array.isArray(lines)?lines:[lines];
  const maxw = fromWalk ? (W-80-32) : (220-24);
  const font = fromWalk ? '16px "Courier New",monospace' : '15px "Courier New",monospace';
  const pages=[];
  for(const ln of arr){ for(const pg of paginate2(ln, maxw, font)) pages.push(pg); }   // 各行を 2行ページに
  dialogLines=pages;
  nextDialog(after);
}
function nextDialog(after){
  if(dialogLines.length===0){ if(after)after(); else toMenu(); return; }
  dialogText=dialogLines.shift(); dialogShown=0; dialogTimer=0;
  afterDialog=(dialogLines.length>0)?()=>nextDialog(after):(after||toMenu);
  state=ST.DIALOG;
}
function splitLines(t){return t.split('\n');}
function toMenu(){ if(enemy&&enemy.hp<=0)return; state=ST.MENU; menuIndex=0; clearPressed(); }

function startBattle(i){
  eIndex=i; enemy=enemies[i];
  bphase.box={x:W/2-110,y:255,w:220,h:135};
  // 戦闘に入った 状況（〇〇が 〇〇で あらわれた）を、行動選択中も ボックスに のこす
  battleMsg=battleStatus(enemy);
  if(enemy.final){ stopMusic(); say(enemy.desc, ()=>argorBreakMercy()); } // 王の登場〜破壊まで 無音（効果音だけ）。本戦曲は 破壊“後”に
  else { playTheme(enemy.key); say(enemy.desc, ()=>toMenu()); }  // モンスター別の 戦闘曲(enemy.key)
}
/* =======================  アルゴール: MERCY破壊カットシーン  =======================
   「予兆 → 構え → 暗転 → 槍落下 → 白フラッシュ → 画面揺れ → 破壊 → 沈黙 → 再開」
   を 約9秒の タイムラインで 演出する（canvas上）。Z で スキップ可。
*/
const argorCut={ t:0, line:'', shards:[], spearY:-60, camZoom:0, dark:0, broke:false, done:false, battleStarted:false, transformed:false };
// タイムライン（フレーム / 60fps）
const ACUT={
  PRE:0,         // 静けさ「……」(変身前の やさしい王)
  CALM:60,       // やさしい王、目を ふせる
  TRANSFORM:200, // ★変身（やさしい王 → 赤い槍を 持つ いくさの王・ぶおんっ）
  RISE:248,      // 大きな赤い槍が、ゆっくり 宙に あらわれはじめる（ぶおんっ）

function updateArgorCut(){

  else if(c.t<ACUT.TRANSFORM){ c.line='王は、しずかに 目を ふせた。\n── けつい が、つたわって くる。'; c.dark=0; c.camZoom=0; }
  else if(c.t<ACUT.RISE){ c.line='王は、いくさの\n すがたへ かわった。';
    c.dark=Math.min(0.18,(c.t-ACUT.TRANSFORM)/50); c.camZoom=0; }
  else if(c.t<ACUT.RISETOP){ // 槍が ゆっくり 宙に あらわれる（認知できる ように）
    c.line='赤い 槍が、しずかに\n 宙へ あらわれる ──';
    const p=(c.t-ACUT.RISE)/(ACUT.RISETOP-ACUT.RISE);
    c.spearY = -220 + p*(HOVER-(-220));   // 上から ゆっくり おりてきて、高く うかぶ

  }

/* 生成した槍画像を 加算合成で 描く（黒背景は消え、光る槍だけ 残る）。

// 白い槍画像を 赤く 着色した オフスクリーンを 作る（一度だけ・キャッシュ）
const _redCache={};
function getRedSpear(frame){
  if(_redCache[frame]) return _redCache[frame];
  try{
    const img=IMG[frame];
    if(img && img.complete && img.naturalWidth){
      const c=document.createElement('canvas'); c.width=img.naturalWidth; c.height=img.naturalHeight;
      const g=c.getContext('2d');
      g.fillStyle='#ff2424'; g.fillRect(0,0,c.width,c.height);
      g.globalCompositeOperation='multiply'; g.drawImage(img,0,0);            // 白→赤、黒→黒
      g.globalCompositeOperation='lighter'; g.globalAlpha=0.4; g.drawImage(img,0,0); // 芯を 明るく
      _redCache[frame]=c; return c;
    }
  }catch(e){}
  return null;
}
function drawSpearImg(cx, tipY, frame){

// 戦闘中の王が 構える 赤い槍（両端に 穂先・白いグリップ）。斜めに 重ねる。
function drawRedSpear(cx, cy, len, ang){
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(ang);
  const L=len/2;
  ctx.globalCompositeOperation='lighter';
  ctx.fillStyle='rgba(235,30,30,0.28)'; ctx.fillRect(-L-8,-11,len+16,22);   // グロー
  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle='#cc1414'; ctx.fillRect(-L,-5,len,10);                       // 柄(赤)
  ctx.fillStyle='#ff6060'; ctx.fillRect(-L,-5,len,3);                        // ハイライト
  ctx.fillStyle='#e22424';
  for(const e of [[L,1],[-L,-1]]){ const x=e[0], d=e[1];                      // 両端の 穂先
    ctx.beginPath();
    ctx.moveTo(x+d*32,0); ctx.lineTo(x+d*9,-14); ctx.lineTo(x+d*13,-4); ctx.lineTo(x,-3);
    ctx.lineTo(x,3); ctx.lineTo(x+d*13,4); ctx.lineTo(x+d*9,14); ctx.closePath(); ctx.fill();
  }
  ctx.fillStyle='#fff';                                                       // 白いグリップ
  ctx.fillRect(-L*0.34-11,-9,22,18); ctx.fillRect(L*0.30-11,-9,22,18);
  ctx.restore();
}
/* みのがす に 投げ込む 赤い槍。先端(tipY)を 下に した 大きく 鋭い 矛先（=みのがす方向の 矢印）。 */
function drawRedLance(cx, tipY, scale){
  scale=scale||1;
  const headLen=60*scale, headW=34*scale, shaftW=12*scale, shaftLen=250*scale;
  const topY=tipY-headLen-shaftLen;          // 柄の 上端
  ctx.save(); ctx.translate(cx,0);
  // グロー（穂先まわり）
  ctx.globalCompositeOperation='lighter';
  ctx.fillStyle='rgba(240,40,40,0.30)';
  ctx.beginPath();
  ctx.moveTo(0,tipY+8); ctx.lineTo(-headW/2-6,tipY-headLen-4); ctx.lineTo(headW/2+6,tipY-headLen-4); ctx.closePath(); ctx.fill();
  ctx.globalCompositeOperation='source-over';
  // 柄（上へ のびる）
  ctx.fillStyle='#cc1414'; ctx.fillRect(-shaftW/2, topY, shaftW, shaftLen);
  ctx.fillStyle='#ff6060'; ctx.fillRect(-shaftW/2, topY, shaftW*0.4, shaftLen);   // ハイライト
  // 白いグリップ
  ctx.fillStyle='#fff';
  ctx.fillRect(-shaftW/2-6, topY+shaftLen*0.50, shaftW+12, 18*scale);
  ctx.fillRect(-shaftW/2-6, topY+shaftLen*0.16, shaftW+12, 14*scale);
  // 穂先（下向きの 鋭い 三角＋かえし）
  const baseY=tipY-headLen;
  ctx.fillStyle='#e22424';
  ctx.beginPath();
  ctx.moveTo(0,tipY);                         // 先端（下）= みのがす を 指す
  ctx.lineTo(-headW/2, baseY);                // 左の かえし
  ctx.lineTo(-shaftW/2-2, baseY+headLen*0.30);
  ctx.lineTo(-shaftW/2, baseY);
  ctx.lineTo(shaftW/2, baseY);
  ctx.lineTo(shaftW/2+2, baseY+headLen*0.30);
  ctx.lineTo(headW/2, baseY);                 // 右の かえし
  ctx.closePath(); ctx.fill();
  // 穂先の 中央稜線（明るく）
  ctx.fillStyle='#ff9a9a';
  ctx.beginPath();
  ctx.moveTo(0,tipY-4*scale); ctx.lineTo(-3.5*scale,baseY+4); ctx.lineTo(3.5*scale,baseY+4); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function resolveFight(){ const box=bphase.box,center=box.x+box.w/2,dist=Math.abs(fightBarLock-center);

  const qual = acc>=0.93?'  ちょくげき！' : acc>=0.7?'  いいね！' : acc<=0.25?'  かすり……' : '';
  lastHitQual=qual;
  if(enemy.final) dmg=Math.round(dmg*(enemy.dmgUp||1));
  enemy.hp-=dmg; fightHitFlash=18; shake=acc>=0.93?14:8; if(acc>=0.93)flash=10; se('hit');
  if(enemy.final){
    if(enemy.hp<=0){ enemy.hp=0; argorDefeated(); return; }
    const r=enemy.hp/enemy.maxhp;
    if(enemy.phase<2 && r<=0.6){ enemy.phase=2;
      say([enemy.name+'に '+dmg+'の ダメージ！'+qual,'王は、きみの 目を 見られない。','槍の きどうが、わずかに ゆれた。','── それでも、たたかいは おわらない。'],()=>enemyTurn()); return; }
    if(enemy.phase<3 && r<=0.25){ enemy.phase=3; enemy.crownFell=true; playTheme('argor_sad'); shake=10;
      say([enemy.name+'に '+dmg+'の ダメージ！'+qual,'王冠が、床に おちた。','そこに いるのは、もう 王では ない。','ただ、おわらせ方を 知らない\n だれか だった。'],()=>enemyTurn()); return; }
    say([enemy.name+'に '+dmg+'の ダメージ！'+qual],()=>enemyTurn()); return;
  }
  if(enemy.hp<=0){ enemy.hp=0; player.kills++; player.exp+=enemy.boss?60:20; player.gold+=8;
    say([enemy.name+'に '+dmg+'の ダメージ！'+qual,enemy.name+'を たおして しまった……。'],()=>winBattle('kill')); }
  else say([enemy.name+'に '+dmg+'の ダメージ！'+qual],()=>enemyTurn()); }

function openFinalChoice(){ subType='final'; subIndex=1; subOptions=['とどめを さす','てを さしのべる']; state=ST.SUB; clearPressed(); }

  bphase.frames=enemy.turnFrames; soul.x=bphase.box.x+bphase.box.w/2; soul.y=bphase.box.y+bphase.box.h/2; soul.invuln=0; clearPressed(); }

/* =======================  ゲームオーバー（決意が砕け、また立ち上がる）  ======================= */
const go={ t:0, halves:[], shown:0, msg:'', optActive:false, opts:[], sel:0 };
function gameOver(){
  state=ST.GAMEOVER; clearPressed();
  stopMusic();                      // まず 静寂
  go.t=0; go.halves=[]; go.shown=0; go.msg=''; go.optActive=false; go.sel=0;
  go.opts = hasSave()? ['つづきから（ともしびへ）','タイトルへ'] : ['タイトルへ'];
}
function updateGameOver(){
  go.t++;
  // 70f: ハートが 割れる
  if(go.t===70){
    se('shatter'); shake=16; flash=10; playTheme('gameover');
    go.halves=[ {side:-1,x:W/2,y:150,vx:-1.4,vy:-1.0,rot:0,vr:-0.05},
                {side: 1,x:W/2,y:150,vx: 1.4,vy:-1.0,rot:0,vr: 0.05} ];
  }
  if(go.t>70){ for(const hf of go.halves){ hf.x+=hf.vx; hf.y+=hf.vy; hf.vy+=0.16; hf.rot+=hf.vr; } }
  // 160f〜: 呼びかけ（タイプ表示）
  if(go.t===160){ go.msg='……「'+player.name+'。」\n「まだ、おわって いない」\n「けつい を、てばなすな」'; go.shown=0; }
  if(go.msg && go.shown<go.msg.length){
    if(go.t%2===0){ go.shown++; if(go.shown%3===0)voiceBlip(VOICES.voice); }
  }
  // 文字を 出しきって 少し 間を おいたら、選択を 出す
  if(go.msg && go.shown>=go.msg.length && go.t>320){ go.optActive=true; }
  // 選択
  if(go.optActive){
    if(consume('up')){ go.sel=(go.sel+go.opts.length-1)%go.opts.length; se('select'); }
    if(consume('down')){ go.sel=(go.sel+1)%go.opts.length; se('select'); }
    if(consume('confirm')){ se('confirm');
      const c=go.opts[go.sel];
      if(c.indexOf('つづき')>=0){ loadGame(); }   // 決意によって、ともしびから 立ち上がる
      else { backToTitle(); }
    }
  }
}

/* =======================  ループ  ======================= */
let gframe=0;
function update(){
  gframe++;                       // アニメ用 グローバルフレーム
  if(shake>0){shake*=0.85;if(shake<0.5)shake=0;}
  if(flash>0)flash--; if(fightHitFlash>0)fightHitFlash--;
  switch(state){
    case ST.TITLE:{
      playTheme('title');   // タイトル中は ずっと タイトル曲（音声解禁後 自動で 鳴り、ループ）
      const opts=titleOptions();
      if(consume('up')){titleSel=(titleSel+opts.length-1)%opts.length;se('select');}
      if(consume('down')){titleSel=(titleSel+1)%opts.length;se('select');}
      if(consume('confirm')){ ensureAudio(); se('confirm');
        const choice=opts[titleSel%opts.length];
        if(choice==='つづきから'){ loadGame(); }
        else { clearSave(); resetGame(); seqPos=0; runSeq(); }
      }
      break;}
    case ST.CUT: updateCut(); break;
    case ST.WALK: updateWalk(); break;
    case ST.DIALOG:
      dialogTimer++;
      if(dialogShown<dialogText.length){ const vv=currentVoice();
        const adv = keys.confirm?2 : ((vv&&vv.slow)? (dialogTimer%2===0?1:0) : 1);
        dialogShown+=adv; const rt=(vv&&vv.rate)||3; if(adv&&dialogShown%rt===0)voiceBlip(vv);
        if(dialogShown>dialogText.length)dialogShown=dialogText.length; }
      if(consume('confirm')){ if(dialogShown<dialogText.length)dialogShown=dialogText.length;
        else { const a=afterDialog; afterDialog=null; if(a)a(); } }
      break;
    case ST.MENU:
      if(consume('left')){menuIndex=(menuIndex+MENU.length-1)%MENU.length;se('select');}
      if(consume('right')){menuIndex=(menuIndex+1)%MENU.length;se('select');}
      if(consume('confirm'))chooseMenu();
      break;
    case ST.SUB:
      if(consume('up')){subIndex=(subIndex+subOptions.length-1)%subOptions.length;se('select');}
      if(consume('down')){subIndex=(subIndex+1)%subOptions.length;se('select');}
      if(consume('cancel')){ if(subType!=='final'){se('cancel');toMenu();} } // 最後の選択は もどれない
      if(consume('confirm'))chooseSub();
      break;
    case ST.FIGHTBAR:{const box=bphase.box;
      if(fightBarLock<0){ fightBarX+=fightBarDir*7;
        if(fightBarX>box.x+box.w-6){fightBarX=box.x+box.w-6;fightBarDir=-1;}
        if(fightBarX<box.x+6){fightBarX=box.x+6;fightBarDir=1;}
        if(consume('confirm')){fightBarLock=fightBarX;resolveFight();} }
      break;}
    case ST.ENEMY: updateBulletPhase(); break;
    case ST.TUTORIAL: updateTutorial(); break;
    case ST.RESULT: if(--resultTimer<=0){const n=resultNext;resultNext=null;if(n)n();} break;
    case ST.ARGORCUT: updateArgorCut(); break;
    case ST.GAMEOVER: updateGameOver(); break;
  }
  clearPressed();
}
let cutTick=0;
function updateCut(){
  cutTick++;
  if(cutShown<cutText.length){ const vv=currentVoice();
    const adv = keys.confirm?3 : ((vv&&vv.slow)? (cutTick%2===0?1:0) : 1);
    cutShown+=adv; const rt=(vv&&vv.rate)||3; if(adv&&cutShown%rt===0)voiceBlip(vv);
    if(cutShown>cutText.length)cutShown=cutText.length; }
  if(cut.choice && cutShown>=cutText.length && cut.idx>=cut.pages.length-1){
    // 選択肢モード
    if(consume('up')||consume('down')){ cut.choice.sel=(cut.choice.sel?0:1); se('select'); }
    if(consume('confirm')){ se('confirm'); const o=cut.choice.opts[cut.choice.sel||0]; const f=o.after; cut.choice=null; f(); }
    return;
  }
  if(consume('confirm')){
    if(cutShown<cutText.length){ cutShown=cutText.length; return; }
    if(cut.idx<cut.pages.length-1){ cut.idx++; loadPage(); }
    else { const a=cut.after; cut.after=null; if(a)a(); }
  }
}
function resetGame(){ Object.assign(player,{hp:20,maxhp:20,lv:1,exp:0,gold:0,candy:3,kills:0,spares:0});
  Object.assign(flags,{obeyedSmoke:false,seq:0,argorSpared:false}); enemies=makeEnemies(); buildStory(); curPlace=''; eIndex=0; }

function updateBulletPhase(){
  const b=bphase,box=b.box; b.t++; const pad=6;
  let mvx=0,mvy=0;
  if(soul.touch){                 // タッチ: ハートが 指の いちへ ついてくる
    const tx=Math.max(box.x+pad,Math.min(box.x+box.w-pad,soul.tx));
    const ty=Math.max(box.y+pad,Math.min(box.y+box.h-pad,soul.ty));
    mvx=tx-soul.x; mvy=ty-soul.y;
    soul.x+=mvx*0.55; soul.y+=mvy*0.55;
  } else {                        // キーボード／Dパッド
    const sp=2.7;
    if(keys.left)mvx-=sp;if(keys.right)mvx+=sp;if(keys.up)mvy-=sp;if(keys.down)mvy+=sp;
    soul.x+=mvx; soul.y+=mvy;
  }
  soul.x=Math.max(box.x+pad,Math.min(box.x+box.w-pad,soul.x));
  soul.y=Math.max(box.y+pad,Math.min(box.y+box.h-pad,soul.y));
  const moving=(Math.abs(mvx)+Math.abs(mvy) > 0.8);   // 青/橙弾の「動いている」判定
  enemy.attack(b);
  if(soul.invuln>0)soul.invuln--;
  for(let i=b.bullets.length-1;i>=0;i--){const bl=b.bullets[i]; bl.upd&&bl.upd();
    if(bl.warn>0){ continue; } // 予告中は 当たらず・消えず
    if(bl.big){ if(bl.life<=0){b.bullets.splice(i,1);continue;} }
    else { const m=40; if(bl.x<box.x-m||bl.x>box.x+box.w+m||bl.y<box.y-m||bl.y>box.y+box.h+m){ if(bl.off||bl.y>box.y-5){b.bullets.splice(i,1);continue;} } }
    if(soul.invuln<=0){ let hit=false;
      if(bl.big){ const cy=box.y+box.h/2,inBand=soul.y>cy-14&&soul.y<cy+14;
        if(inBand){ if(bl.color==='blue'&&moving)hit=true; if(bl.color==='orange'&&!moving)hit=true; } }
      else if(bl.r!==undefined){ const dx=soul.x-bl.x,dy=soul.y-bl.y; if(dx*dx+dy*dy<(bl.r+4)*(bl.r+4))hit=true; }
      else { if(soul.x>bl.x-2&&soul.x<bl.x+bl.w+2&&soul.y>bl.y-2&&soul.y<bl.y+bl.h+2)hit=true; }
      if(hit){ damagePlayer(enemy.atk); soul.invuln=30; } }
  }
  if(b.t>=b.frames && b.bullets.filter(x=>!x.big).length===0) endEnemyTurn();
  else if(b.t>=b.frames+90) endEnemyTurn();
}
function damagePlayer(d){ player.hp-=d; shake=8; flash=6; se('hurt'); if(player.hp<=0){player.hp=0;gameOver();} }

function txt(s,x,y,size,color,align){ ctx.fillStyle=color||'#fff'; ctx.font=size+'px "Courier New",monospace'; ctx.textAlign=align||'left'; ctx.fillText(s,x,y); ctx.textAlign='left'; }
function drawImgCover(img,dark){ if(img&&img.complete&&img.naturalWidth){ const s=Math.max(W/img.naturalWidth,H/img.naturalHeight);
    const w=img.naturalWidth*s,h=img.naturalHeight*s; ctx.drawImage(img,(W-w)/2,(H-h)/2,w,h); }
  ctx.fillStyle='rgba(0,0,0,'+dark+')'; ctx.fillRect(0,0,W,H); }
function drawImgFit(img,cx,cy,maxw,maxh){ if(!img||!img.complete||!img.naturalWidth)return;
  const s=Math.min(maxw/img.naturalWidth,maxh/img.naturalHeight),w=img.naturalWidth*s,h=img.naturalHeight*s;
  ctx.drawImage(img,cx-w/2,cy-h/2,w,h); }
/* 指定した w×h ぴったりに 描く（アスペクト無視）。王の すがたを「少し横長の長方形」で 一定サイズに 出す用。 */
function drawImgStretch(img,cx,cy,w,h){ if(!img||!img.complete||!img.naturalWidth)return; ctx.drawImage(img,cx-w/2,cy-h/2,w,h); }

function drawCut(){

  // ページ数

function wrapText(text,x,y,maxw,lh){ let line='',yy=y;
  for(const ch of text){ if(ch==='\n'){ctx.fillText(line,x,yy);line='';yy+=lh;continue;}
    const test=line+ch; if(ctx.measureText(test).width>maxw){ctx.fillText(line,x,yy);line=(ch===' '?'':ch);yy+=lh;} else line=test; }
  ctx.fillText(line,x,yy); }

/* 王の2フレームを クロスフェードで なめらかに 重ねて 描く（動画のような 補間）。
   足元エリアを 黒で 塗ってから 重ねるので、ゴーストや 背景の にじみが 出ない。 */
function drawKingX(fa, fb, cx, cy, p){

  ctx.globalAlpha=1;
}

/* 行動選択中、戦闘ボックスに「いまの 状況・表情」を のこして 見せる */

function drawBox(){const b=bphase.box;ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.strokeRect(b.x,b.y,b.w,b.h);}
function drawBulletsAndSoul(){ const b=bphase.box; ctx.save(); ctx.beginPath(); ctx.rect(b.x-2,b.y-2,b.w+4,b.h+4); ctx.clip();
  for(const bl of bphase.bullets)bl.draw&&bl.draw(ctx); ctx.restore();
  if(soul.invuln%6<3)drawHeart(soul.x,soul.y,soul.invuln>0?'#a00':'#f00',5); }
function drawHeart(x,y,col,s){ s=s||5; ctx.fillStyle=col; ctx.beginPath();
  ctx.moveTo(x,y+s*0.7);
  ctx.bezierCurveTo(x,y-s*0.2,x-s,y-s*0.4,x-s,y+s*0.2);
  ctx.bezierCurveTo(x-s,y+s*0.9,x,y+s*1.1,x,y+s*1.5);
  ctx.bezierCurveTo(x,y+s*1.1,x+s,y+s*0.9,x+s,y+s*0.2);
  ctx.bezierCurveTo(x+s,y-s*0.4,x,y-s*0.2,x,y+s*0.7); ctx.fill(); }
function drawFightBar(){const b=bphase.box; const cx=b.x+b.w/2, my=b.y+b.h/2, half=b.w/2-8;
  // 威力ゲージ帯: 中央ほど 明るい＝高ダメージ（ひと目で わかる）
  for(let x=b.x+8; x<b.x+b.w-8; x+=3){ const d=Math.abs(x-cx)/half; const a=Math.pow(Math.max(0,1-d),1.7);
    ctx.fillStyle='rgba(255,238,90,'+(0.10+a*0.75)+')'; ctx.fillRect(x,my-18,3,36); }
  // ちょくげき ゾーン枠（中央）
  ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.strokeRect(cx-Math.round(half*0.07)-3, my-18, Math.round(half*0.14)+6, 36);
  txt('ちょくげき', cx, b.y-2, 10, '#ff6','center');
  // 中央ターゲット線
  ctx.strokeStyle='#ff3'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(cx,b.y+4); ctx.lineTo(cx,b.y+b.h-4); ctx.stroke();
  // スライダー（とまる いち）
  const sx=(fightBarLock<0?fightBarX:fightBarLock);
  ctx.fillStyle='#fff'; ctx.fillRect(sx-3,b.y+4,6,b.h-8);
  txt('▼', sx, b.y-14, 13, '#fff','center');
  // 説明
  txt('Z で きる！  中央(ちょくげき)に ちかいほど 大ダメージ', cx, b.y+b.h+10, 12, '#bbb','center');}
function drawOverworldDialog(){
  // 探索中の会話ボックス（下部）。戦闘の絵は出さない
  const bx=40,by=H-150,bw=W-80,bh=110;
  ctx.fillStyle='rgba(0,0,0,0.8)'; ctx.fillRect(bx,by,bw,bh);
  ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.strokeRect(bx,by,bw,bh);
  ctx.fillStyle='#fff'; ctx.font='16px "Courier New",monospace'; ctx.textAlign='left';
  wrapText('* '+dialogText.substring(0,dialogShown),bx+16,by+16,bw-32,22);
  if(dialogShown>=dialogText.length && Math.floor(Date.now()/400)%2===0) txt('▼',bx+bw-26,by+bh-28,16,'#fff');
}
function drawDialogBox(){const b=bphase.box;ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.strokeRect(b.x,b.y,b.w,b.h);
  ctx.fillStyle='#fff';ctx.font='15px "Courier New",monospace';ctx.textAlign='left';
  wrapText('* '+dialogText.substring(0,dialogShown),b.x+12,b.y+14,b.w-24,20);
  if(state===ST.DIALOG&&dialogShown>=dialogText.length&&Math.floor(Date.now()/400)%2===0)txt('▼',b.x+b.w-22,b.y+b.h-26,16,'#fff');}
function drawMenu(){const y=H-70;
  const mercyBroke = enemy&&enemy.final&&enemy.mercyBroken&&!enemy.downed;
  for(let i=0;i<MENU.length;i++){const x=40+i*145,sel=(i===menuIndex);
    if(i===3 && mercyBroke){
      // 砕けた MERCY: ヒビと 破片
      ctx.strokeStyle='#544';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+58,y);ctx.moveTo(x+72,y);ctx.lineTo(x+130,y);
      ctx.lineTo(x+130,y+18);ctx.moveTo(x+130,y+30);ctx.lineTo(x+130,y+40);ctx.lineTo(x+70,y+40);
      ctx.moveTo(x+58,y+40);ctx.lineTo(x,y+40);ctx.lineTo(x,y);ctx.stroke();
      // ヒビ
      ctx.strokeStyle='#765';ctx.beginPath();ctx.moveTo(x+65,y);ctx.lineTo(x+60,y+14);ctx.lineTo(x+72,y+26);ctx.lineTo(x+66,y+40);ctx.stroke();
      const pulse = Math.floor(Date.now()/350)%2===0;
      txt('□□□□',x+65,y+12,15, pulse?'#a98':'#655','center');
      continue;
    }
    ctx.strokeStyle=sel?'#ff3':'#f80';ctx.lineWidth=2;ctx.strokeRect(x,y,130,40);
    txt(MENU[i],x+65,y+12,16,sel?'#ff3':'#fa3','center'); if(sel)drawHeart(x+14,y+20,'#f00',5);}
  if(mercyBroke) txt('慈悲は、砕かれた。',W/2,y-22,13,'#866','center');}
function drawSub(){const b=bphase.box;ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.strokeRect(b.x,b.y,b.w,b.h);
  const head = subType==='act'?'* こうどう':subType==='item'?'* どうぐ':subType==='fconf'?'* ……本当に？':subType==='final'?'* ……どうする？':'* みのがす';
  txt(head,b.x+12,b.y+8,14, subType==='final'||subType==='fconf'?'#ff6':'#aaa');
  for(let i=0;i<subOptions.length;i++){const yy=b.y+34+i*24,sel=(i===subIndex);
    txt(subOptions[i],b.x+34,yy,15,sel?'#ff3':'#fff'); if(sel)drawHeart(b.x+18,yy+7,'#f00',5);}
  txt(subType==='fconf'||subType==='final'?'':'X: もどる',b.x+b.w-18,b.y+b.h-20,11,'#666','right');}
function drawHUD(){const y=H-20;
  txt(player.name,40,y-6,15,'#fff'); txt('LV '+player.lv,165,y-6,15,'#fff');
  const hx=240,hw=120; txt('HP',hx-30,y-6,13,'#fff');
  ctx.fillStyle='#a00';ctx.fillRect(hx,y-4,hw,14); ctx.fillStyle='#ff3';ctx.fillRect(hx,y-4,hw*Math.max(0,player.hp)/player.maxhp,14);
  txt(Math.max(0,player.hp)+' / '+player.maxhp,hx+hw+12,y-6,14,'#fff');}
function drawGameOver(){
  ctx.fillStyle='#000'; ctx.fillRect(-40,-40,W+80,H+80);
  if(go.t<70){
    // 砕ける まえ: ハートが しずかに 止まる（少しだけ ふるえる）
    const tr = go.t>50? (Math.random()-0.5)*2 : 0;
    drawHeart(W/2+tr,150,'#f00',14);
    if(go.t>30 && Math.floor(go.t/8)%2===0){ // 直前に ヒビが はしる
      ctx.strokeStyle='#700'; ctx.lineWidth=2; ctx.beginPath();
      ctx.moveTo(W/2,136); ctx.lineTo(W/2-3,150); ctx.lineTo(W/2+3,162); ctx.lineTo(W/2-2,176); ctx.stroke();
    }
  } else {
    // 砕けた あと: 2つの 半分が おちていく
    for(const hf of go.halves) drawHeartHalf(hf,14);
  }
  // 呼びかけ（タイプ表示）
  if(go.msg){
    ctx.fillStyle='#fff'; ctx.font='17px "Courier New",monospace'; ctx.textAlign='center';
    const shown=go.msg.substring(0,go.shown).split('\n');
    let yy=250; for(const ln of shown){ ctx.fillText(ln,W/2,yy); yy+=30; }
    ctx.textAlign='left';
  }
  // 選択肢
  if(go.optActive){
    for(let i=0;i<go.opts.length;i++){ const yy=380+i*30, sel=(i===go.sel);
      txt((sel?'▶ ':'   ')+go.opts[i],W/2,yy,16,sel?'#ff3':'#888','center'); }
    txt('↑↓ えらぶ   Z けってい',W/2,380+go.opts.length*30+8,12,'#555','center');
  }
}
/* 割れた ハートの 片割れ（クリップで 半分だけ 描く） */
function drawHeartHalf(hf,s){
  ctx.save();
  ctx.translate(hf.x,hf.y); ctx.rotate(hf.rot);
  ctx.beginPath();
  if(hf.side<0) ctx.rect(-s*2,-s*2, s*2, s*4);   // 左半分
  else          ctx.rect(0,-s*2, s*2, s*4);       // 右半分
  ctx.clip();
  // ローカル原点 中心に ハート
  ctx.fillStyle='#c00';
  const x=0,y=-s*0.7;
  ctx.beginPath();
  ctx.moveTo(x,y+s*0.7);
  ctx.bezierCurveTo(x,y-s*0.2,x-s,y-s*0.4,x-s,y+s*0.2);
  ctx.bezierCurveTo(x-s,y+s*0.9,x,y+s*1.1,x,y+s*1.5);
  ctx.bezierCurveTo(x,y+s*1.1,x+s,y+s*0.9,x+s,y+s*0.2);
  ctx.bezierCurveTo(x+s,y-s*0.4,x,y-s*0.2,x,y+s*0.7); ctx.fill();
  ctx.restore();
}

/* =======================  起動  ======================= */
function loop(){ update(); draw(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);
</script>
