<meta charset="UTF-8">

<title>やさしい地下 ── 完全版</title>
<style>
  html,body{margin:0;padding:0;background:#000;height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;

/* ---- 画像 (base64は後から注入) ---- */
const IMG_B64 = __IMG_JSON__;
const IMG = {};
for(const k in IMG_B64){ const im=new Image(); im.src='data:image/png;base64,'+IMG_B64[k]; IMG[k]=im; }

const cv=document.getElementById('c'), ctx=cv.getContext('2d');
const W=cv.width,H=cv.height; ctx.textBaseline='top';

/* =======================  入力  ======================= */
const keys={}, pressed={};
function normKey(k){switch(k){
  case'ArrowUp':case'w':case'W':return'up';
  case'ArrowDown':case's':case'S':return'down';
  case'ArrowLeft':case'a':case'A':return'left';
  case'ArrowRight':case'd':case'D':return'right';
  case'z':case'Z':case'Enter':case' ':return'confirm';
  case'x':case'X':case'Shift':case'Backspace':return'cancel';
  case'm':case'M':return'mute';
}return null;}
function setKey(k,d){k=normKey(k);if(!k)return;if(d&&!keys[k])pressed[k]=true;keys[k]=d;}
window.addEventListener('keydown',e=>{const n=normKey(e.key);if(n){e.preventDefault();setKey(e.key,true);ensureAudio();if(n==='mute')toggleMute();}});
window.addEventListener('keyup',e=>setKey(e.key,false));
document.querySelectorAll('#pad .btn').forEach(b=>{const k=b.getAttribute('data-k');
  const dn=e=>{e.preventDefault();setKey(k,true);ensureAudio();};const up=e=>{e.preventDefault();setKey(k,false);};
  b.addEventListener('touchstart',dn,{passive:false});b.addEventListener('touchend',up,{passive:false});
  b.addEventListener('mousedown',dn);b.addEventListener('mouseup',up);b.addEventListener('mouseleave',up);});
function consume(k){if(pressed[k]){pressed[k]=false;return true;}return false;}
function clearPressed(){for(const k in pressed)pressed[k]=false;}

/* =======================  音楽エンジン (Web Audio · 8bit)  ======================= */
let AC=null, masterGain=null, muted=false, curTheme=null, sched=null;
function ensureAudio(){
  if(AC) { if(AC.state==='suspended') AC.resume(); return; }
  try{
    AC=new (window.AudioContext||window.webkitAudioContext)();
    masterGain=AC.createGain(); masterGain.gain.value=0.16; masterGain.connect(AC.destination);
    if(curTheme) playTheme(curTheme,true);
  }catch(e){ AC=null; }
}
function toggleMute(){ muted=!muted; if(masterGain) masterGain.gain.value=muted?0:0.16; }
function midi(n){ return 440*Math.pow(2,(n-69)/12); }
function blip(freq,dur,type,vol,t0){
  if(!AC||muted) return;
  const t=t0||AC.currentTime;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type||'square'; o.frequency.value=freq;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol||0.5,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+dur+0.02);
}
/* テーマ定義: lead(midi列), bass(midi列), tempo(秒/拍), leadType */
const N=0; // rest
const THEMES={
  title:{tempo:0.34,leadType:'triangle',
    lead:[69,71,72,74,72,71,69,N, 67,69,71,69,67,N,N,N, 64,67,69,71,72,71,69,67, 69,N,N,N,N,N,N,N],
    bass:[57,N,52,N,53,N,52,N, 50,N,55,N,52,N,55,N]},
  explore:{tempo:0.30,leadType:'triangle',
    lead:[72,N,74,N,76,74,72,N, 71,N,69,N,67,N,69,N, 72,N,71,N,69,N,67,N, 64,N,N,N,N,N,N,N],
    bass:[48,N,55,N,50,N,57,N, 53,N,60,N,55,N,N,N]},
  hone:{tempo:0.20,leadType:'square',  // こわがり: 上ずって ふるえる
    lead:[76,77,76,77,76,N,72,N, 74,75,74,75,74,N,71,N, 76,77,76,N,79,N,76,N, 72,N,71,N,69,N,N,N],

    lead:[72,76,79,84,79,76,72,76, 74,77,81,86,81,77,74,77, 76,79,83,88,83,79,76,N, 84,83,81,79,77,76,74,72],

    bass:[48,N,55,N,53,N,52,N]},
  light:{tempo:0.40,leadType:'triangle', // 光のエンディング
    lead:[64,67,72,71,69,67,69,72, 74,72,71,69,67,69,71,N, 76,74,72,71,72,74,76,79, 72,N,N,N,N,N,N,N],
    bass:[48,55,52,59,53,60,55,N]},
  hollow:{tempo:0.5,leadType:'triangle', // むなしいエンディング
    lead:[69,N,N,N,67,N,N,N, 64,N,N,N,62,N,N,N, 60,N,N,N,N,N,N,N, N,N,N,N,N,N,N,N],
    bass:[33,N,N,N,N,N,N,N]},
  gameover:{tempo:0.4,leadType:'triangle',
    lead:[69,67,64,60,N,N,N,N],bass:[45,N,40,N]},
};
let sIdx=0, bIdx=0;
function playTheme(name,force){
  if(curTheme===name && !force){ return; }
  curTheme=name; sIdx=0; bIdx=0;
  if(!AC){ return; }
  if(sched) clearInterval(sched);
  const th=THEMES[name]; if(!th) return;
  const step=()=>{
    if(!AC||muted){ return; }
    const th=THEMES[curTheme]; if(!th) return;
    const t=AC.currentTime+0.02;
    const ln=th.lead[sIdx%th.lead.length];
    if(ln>0) blip(midi(ln),th.tempo*0.95,th.leadType,0.42,t);
    const bn=th.bass[bIdx%th.bass.length];
    if(bn>0) blip(midi(bn),th.tempo*1.4,'triangle',0.5,t);
    // ハット
    if(name!=='hollow' && sIdx%2===0 && AC){
      const o=AC.createGain(); o.gain.setValueAtTime(0.06,t); o.gain.exponentialRampToValueAtTime(0.0001,t+0.05);
      const bs=AC.createBufferSource(); const buf=AC.createBuffer(1,256,AC.sampleRate);
      const d=buf.getChannelData(0); for(let i=0;i<256;i++)d[i]=Math.random()*2-1; bs.buffer=buf;
      bs.connect(o); o.connect(masterGain); bs.start(t); bs.stop(t+0.05);
    }
    sIdx++; if(sIdx%2===0) bIdx++;
  };
  sched=setInterval(step, THEMES[name].tempo*1000);
}
/* 効果音 */
function se(kind){
  if(!AC||muted)return; const t=AC.currentTime;
  if(kind==='select') blip(660,0.05,'square',0.3,t);
  else if(kind==='confirm'){ blip(880,0.05,'square',0.35,t); blip(1320,0.05,'square',0.25,t+0.05); }
  else if(kind==='cancel') blip(330,0.06,'square',0.3,t);
  else if(kind==='hit'){ blip(160,0.12,'square',0.5,t); blip(110,0.12,'sawtooth',0.3,t); }
  else if(kind==='hurt'){ blip(200,0.15,'sawtooth',0.5,t); blip(150,0.2,'square',0.4,t+0.02); }
  else if(kind==='heal'){ blip(880,0.1,'triangle',0.4,t); blip(1320,0.12,'triangle',0.3,t+0.08); }
  else if(kind==='spare'){ [659,784,988,1319].forEach((f,i)=>blip(f,0.18,'triangle',0.35,t+i*0.09)); }
  else if(kind==='text') blip(740,0.02,'square',0.12,t);
  else if(kind==='save'){ [523,659,784,1047].forEach((f,i)=>blip(f,0.25,'triangle',0.3,t+i*0.12)); }
}

function drawStar(c,cx,cy,sp,outer,inner,rot){c.fillStyle='#fff';c.beginPath();
  for(let i=0;i<sp*2;i++){const r=i%2===0?outer:inner,a=rot+i*Math.PI/sp,x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;i===0?c.moveTo(x,y):c.lineTo(x,y);}
  c.closePath();c.fill();}

/* 進行の順序 */
const SEQ=['intro','awaken','room_hone','battle_hone','after_hone','room_kirari','battle_kirari','after_kirari','room_wanda','battle_wanda','after_wanda','gate_room','battle_kakuto','ending'];
let seqPos=0;
function advance(){ seqPos++; runSeq(); }
function runSeq(){
  const s=SEQ[seqPos];
  if(s==='intro') sceneIntro();
  else if(s==='awaken') sceneAwaken();
  else if(s==='room_hone') roomHone();
  else if(s==='battle_hone') startBattle(0);
  else if(s==='after_hone') afterHone();
  else if(s==='room_kirari') roomKirari();
  else if(s==='battle_kirari') startBattle(1);
  else if(s==='after_kirari') afterKirari();
  else if(s==='room_wanda') roomWanda();
  else if(s==='battle_wanda') startBattle(2);
  else if(s==='after_wanda') afterWanda();
  else if(s==='gate_room') gateRoom();
  else if(s==='battle_kakuto') startBattle(3);
  else if(s==='ending') sceneEnding();
}

const room={cfg:null, px:60, py:240, anim:0, near:null};
function makeWalkRoom(cfg){
  room.cfg=cfg; room.px=60; room.py=240; room.anim=0; room.near=null;
  room.saved=false;
  state=ST.WALK; clearPressed();
  // ルームに入った時のタイトル表示
  roomBanner=cfg.title||''; roomBannerT=160;
}
let roomBanner='',roomBannerT=0;
function updateWalk(){
  const c=room.cfg; if(!c)return;
  const sp=3; let mvx=0,mvy=0;
  if(keys.left)mvx-=sp; if(keys.right)mvx+=sp; if(keys.up)mvy-=sp; if(keys.down)mvy+=sp;
  room.px+=mvx; room.py+=mvy;
  room.px=Math.max(40,Math.min(W-40,room.px)); room.py=Math.max(120,Math.min(H-90,room.py));
  if(mvx||mvy) room.anim+=0.2;
  if(roomBannerT>0)roomBannerT--;
  // 近接判定
  room.near=null;
  for(const n of c.npcs||[]){ if(Math.hypot(room.px-n.x,room.py-n.y)<46){ room.near={type:'npc',obj:n}; } }
  if(c.saveAt && Math.hypot(room.px-c.saveAt.x,room.py-c.saveAt.y)<46){ room.near={type:'save'}; }
  // 出口（右はし）
  const exitX=W-50;
  if(room.px>exitX-10){ room.near={type:'exit'}; }
  if(consume('confirm') && room.near){
    if(room.near.type==='npc'){ se('confirm'); say(splitLines(room.near.obj.lines.join('\n')),()=>{state=ST.WALK;clearPressed();},true); }
    else if(room.near.type==='save'){ se('save'); doSave(); }
    else if(room.near.type==='exit'){ se('confirm'); const ex=c.onExit;
      if(c.exitText){ say(splitLines(c.exitText),()=>{ ex&&ex(); },true); } else { ex&&ex(); } }
  }
}
function doSave(){
  player.hp=player.maxhp;
  say(['ともしびに ふれた。','けつい が、こころに ともる。','(HPが かいふくし、この あたりを\n 覚えた)'],()=>{state=ST.WALK;clearPressed();},true);
}
function drawWalk(){
  const c=room.cfg;
  // 背景
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  // ゆかの格子（地下っぽさ）
  ctx.strokeStyle='#0d0d0d'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,110);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=110;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.strokeStyle='#222'; ctx.lineWidth=2; ctx.strokeRect(20,108,W-40,H-118);
  // 出口の矢印
  ctx.fillStyle=(room.near&&room.near.type==='exit')?'#ff3':'#555';
  txt('▶',W-40,H/2-20,28,(room.near&&room.near.type==='exit')?'#ff3':'#555','center');
  txt('みち',W-40,H/2+12,12,'#555','center');
  // NPC
  for(const n of c.npcs||[]){
    ctx.fillStyle='#888'; ctx.fillRect(n.x-12,n.y-16,24,30);
    ctx.fillStyle='#bbb'; ctx.fillRect(n.x-10,n.y-14,20,10);
    txt(n.label,n.x,n.y+18,11,(room.near&&room.near.obj===n)?'#ff3':'#888','center');
  }
  // セーブポイント（ともしび）
  if(c.saveAt){ const f=c.saveAt; const fl=Math.sin(Date.now()*0.01)*3;
    ctx.fillStyle=(room.near&&room.near.type==='save')?'#ff6':'#fc3';
    ctx.beginPath(); ctx.ellipse(f.x,f.y+fl,7,12,0,0,7); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(f.x,f.y+4+fl,3,6,0,0,7); ctx.fill();
    txt('ともしび',f.x,f.y+22,11,(room.near&&room.near.type==='save')?'#ff6':'#a80','center'); }
  // プレイヤー（ハート）
  const bob=Math.sin(room.anim)*2;
  drawHeart(room.px,room.py+bob,'#f00',7);
  // 操作ヒント
  if(room.near){ const m=room.near.type==='exit'?'すすむ':room.near.type==='save'?'ともしびに ふれる':'しらべる';
    txt('Z: '+m,room.px,room.py-26,12,'#ff3','center'); }
  // バナー
  if(roomBannerT>0){ ctx.globalAlpha=Math.min(1,roomBannerT/40); txt('── '+roomBanner+' ──',W/2,60,20,'#fff','center'); ctx.globalAlpha=1; }
  // 下部ヒント
  txt('↑↓←→ あるく   Z しらべる/すすむ',W/2,H-24,12,'#555','center');
}

let subType='',subIndex=0,subOptions=[];
let dialogLines=[],dialogText='',dialogShown=0,dialogTimer=0,afterDialog=null,dialogReturnWalk=false;
const bphase={active:false,t:0,frames:0,bullets:[],box:{x:0,y:0,w:0,h:0}};
const soul={x:0,y:0,invuln:0};
let shake=0,flash=0,fightHitFlash=0,fightBarX=0,fightBarDir=1,fightBarLock=-1,resultTimer=0,resultNext=null;

function say(lines,after,fromWalk){ dialogReturnWalk=!!fromWalk; dialogLines=Array.isArray(lines)?lines.slice():[lines]; nextDialog(after); }
function nextDialog(after){
  if(dialogLines.length===0){ if(after)after(); else toMenu(); return; }
  dialogText=dialogLines.shift(); dialogShown=0; dialogTimer=0;
  afterDialog=(dialogLines.length>0)?()=>nextDialog(after):(after||toMenu);
  state=ST.DIALOG;
}
function splitLines(t){return t.split('\n');}
function toMenu(){ if(enemy&&enemy.hp<=0)return; state=ST.MENU; menuIndex=0; clearPressed(); }

function startBattle(i){
  eIndex=i; enemy=enemies[i];
  bphase.box={x:W/2-110,y:255,w:220,h:135};
  playTheme(enemy.theme);
  say(enemy.desc, ()=>toMenu());
}
function chooseMenu(){ se('confirm'); const cmd=MENU[menuIndex];
  if(cmd==='たたかう')startFightBar(); else if(cmd==='こうどう')openSub('act');
  else if(cmd==='どうぐ')openSub('item'); else openSub('mercy'); }
function openSub(type){ subType=type; subIndex=0;
  if(type==='act')subOptions=enemy.acts.map(a=>a.label);
  else if(type==='item')subOptions=player.candy>0?['いやしキャンディ ('+player.candy+')']:['（どうぐが ない）'];
  else subOptions=['みのがす'+(enemy.spareReady?' ★':''),'にげる'];
  state=ST.SUB; clearPressed(); }
function chooseSub(){ se('confirm');
  if(subType==='act'){ const a=enemy.acts[subIndex]; if(a.effect)a.effect(enemy);
    const t=(typeof a.text==='function')?a.text(enemy):a.text; say(splitLines(t),()=>enemyTurn()); }
  else if(subType==='item'){ if(player.candy>0){ player.candy--; se('heal'); const heal=10; player.hp=Math.min(player.maxhp,player.hp+heal);
      say(['いやしキャンディを たべた。','HPが '+heal+' かいふくした！'],()=>enemyTurn()); }
    else say(['もちものが ない。'],()=>toMenu()); }
  else { if(subIndex===0){ if(enemy.spareReady){ player.spares++; se('spare'); playTheme('peace');
        say(splitLines(enemy.spareText),()=>winBattle('spare')); }
      else say(['まだ みのがせ そうに ない。','（あいての こころを ほぐして みよう）'],()=>enemyTurn()); }
    else say(['だっしゅつ できない！','この あいてと むきあう しか ない。'],()=>enemyTurn()); }
}
function startFightBar(){ state=ST.FIGHTBAR; fightBarX=bphase.box.x+6; fightBarDir=1; fightBarLock=-1; clearPressed(); }
function resolveFight(){ const box=bphase.box,center=box.x+box.w/2,dist=Math.abs(fightBarLock-center);
  const acc=Math.max(0,1-dist/(box.w/2)),dmg=Math.round(12+acc*22);
  enemy.hp-=dmg; fightHitFlash=18; shake=8; se('hit');
  if(enemy.hp<=0){ enemy.hp=0; player.kills++; player.exp+=enemy.boss?60:20; player.gold+=8;
    say([enemy.name+'に '+dmg+'の ダメージ！',enemy.name+'を たおして しまった……。'],()=>winBattle('kill')); }
  else say([enemy.name+'に '+dmg+'の ダメージ！'],()=>enemyTurn()); }
function enemyTurn(){ if(enemy.hp<=0)return; state=ST.ENEMY; bphase.active=true; bphase.t=0; bphase.bullets=[];
  bphase.frames=enemy.turnFrames; soul.x=bphase.box.x+bphase.box.w/2; soul.y=bphase.box.y+bphase.box.h/2; soul.invuln=0; clearPressed(); }
function endEnemyTurn(){ bphase.active=false; const fl=enemy.flavor[Math.floor(Math.random()*enemy.flavor.length)]; say([fl],()=>toMenu()); }
function winBattle(kind){ state=ST.RESULT; resultTimer=70; flash=12; resultNext=()=>advance(); }
function gameOver(){ state=ST.GAMEOVER; flash=20; shake=14; playTheme('gameover'); clearPressed(); }

/* =======================  ループ  ======================= */
function update(){
  if(shake>0){shake*=0.85;if(shake<0.5)shake=0;}
  if(flash>0)flash--; if(fightHitFlash>0)fightHitFlash--;
  switch(state){
    case ST.TITLE:
      if(consume('confirm')){ ensureAudio(); resetGame(); seqPos=0; runSeq(); }
      break;
    case ST.CUT: updateCut(); break;
    case ST.WALK: updateWalk(); break;
    case ST.DIALOG:
      dialogTimer++;
      if(dialogShown<dialogText.length){ dialogShown+=(keys.confirm?2:1); if(dialogShown%3===0)se('text'); if(dialogShown>dialogText.length)dialogShown=dialogText.length; }
      if(consume('confirm')){ if(dialogShown<dialogText.length)dialogShown=dialogText.length;
        else { const a=afterDialog; afterDialog=null; if(a)a(); } }
      break;
    case ST.MENU:
      if(consume('left')){menuIndex=(menuIndex+MENU.length-1)%MENU.length;se('select');}
      if(consume('right')){menuIndex=(menuIndex+1)%MENU.length;se('select');}
      if(consume('confirm'))chooseMenu();
      break;
    case ST.SUB:
      if(consume('up')){subIndex=(subIndex+subOptions.length-1)%subOptions.length;se('select');}
      if(consume('down')){subIndex=(subIndex+1)%subOptions.length;se('select');}
      if(consume('cancel')){se('cancel');toMenu();}
      if(consume('confirm'))chooseSub();
      break;
    case ST.FIGHTBAR:{const box=bphase.box;
      if(fightBarLock<0){ fightBarX+=fightBarDir*7;
        if(fightBarX>box.x+box.w-6){fightBarX=box.x+box.w-6;fightBarDir=-1;}
        if(fightBarX<box.x+6){fightBarX=box.x+6;fightBarDir=1;}
        if(consume('confirm')){fightBarLock=fightBarX;resolveFight();} }
      break;}
    case ST.ENEMY: updateBulletPhase(); break;
    case ST.RESULT: if(--resultTimer<=0){const n=resultNext;resultNext=null;if(n)n();} break;
    case ST.GAMEOVER: if(consume('confirm')){backToTitle();} break;
  }
  clearPressed();
}
function updateCut(){
  if(cutShown<cutText.length){ cutShown+=(keys.confirm?3:1); if(cutShown%3===0)se('text'); if(cutShown>cutText.length)cutShown=cutText.length; }
  if(cut.choice && cutShown>=cutText.length && cut.idx>=cut.pages.length-1){
    // 選択肢モード
    if(consume('up')||consume('down')){ cut.choice.sel=(cut.choice.sel?0:1); se('select'); }
    if(consume('confirm')){ se('confirm'); const o=cut.choice.opts[cut.choice.sel||0]; const f=o.after; cut.choice=null; f(); }
    return;
  }
  if(consume('confirm')){
    if(cutShown<cutText.length){ cutShown=cutText.length; return; }
    if(cut.idx<cut.pages.length-1){ cut.idx++; loadPage(); }
    else { const a=cut.after; cut.after=null; if(a)a(); }
  }
}
function resetGame(){ Object.assign(player,{hp:20,maxhp:20,lv:1,exp:0,gold:0,candy:3,kills:0,spares:0});
  Object.assign(flags,{obeyedSmoke:false,seq:0}); enemies=makeEnemies(); eIndex=0; }

function updateBulletPhase(){
  const b=bphase,box=b.box; b.t++;
  const sp=2.7; let mvx=0,mvy=0;
  if(keys.left)mvx-=sp;if(keys.right)mvx+=sp;if(keys.up)mvy-=sp;if(keys.down)mvy+=sp;
  soul.x+=mvx; soul.y+=mvy; const pad=6;
  soul.x=Math.max(box.x+pad,Math.min(box.x+box.w-pad,soul.x));
  soul.y=Math.max(box.y+pad,Math.min(box.y+box.h-pad,soul.y));
  const moving=(mvx!==0||mvy!==0);
  enemy.attack(b);
  if(soul.invuln>0)soul.invuln--;
  for(let i=b.bullets.length-1;i>=0;i--){const bl=b.bullets[i]; bl.upd&&bl.upd();
    if(bl.big){ if(bl.life<=0){b.bullets.splice(i,1);continue;} }
    else { const m=40; if(bl.x<box.x-m||bl.x>box.x+box.w+m||bl.y<box.y-m||bl.y>box.y+box.h+m){ if(bl.off||bl.y>box.y-5){b.bullets.splice(i,1);continue;} } }
    if(soul.invuln<=0){ let hit=false;
      if(bl.big){ const cy=box.y+box.h/2,inBand=soul.y>cy-14&&soul.y<cy+14;
        if(inBand){ if(bl.color==='blue'&&moving)hit=true; if(bl.color==='orange'&&!moving)hit=true; } }
      else if(bl.r!==undefined){ const dx=soul.x-bl.x,dy=soul.y-bl.y; if(dx*dx+dy*dy<(bl.r+4)*(bl.r+4))hit=true; }
      else { if(soul.x>bl.x-2&&soul.x<bl.x+bl.w+2&&soul.y>bl.y-2&&soul.y<bl.y+bl.h+2)hit=true; }
      if(hit){ damagePlayer(enemy.atk); soul.invuln=30; } }
  }
  if(b.t>=b.frames && b.bullets.filter(x=>!x.big).length===0) endEnemyTurn();
  else if(b.t>=b.frames+90) endEnemyTurn();
}
function damagePlayer(d){ player.hp-=d; shake=8; flash=6; se('hurt'); if(player.hp<=0){player.hp=0;gameOver();} }

/* =======================  描画  ======================= */
function draw(){
  ctx.save(); if(shake>0)ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
  ctx.fillStyle='#000'; ctx.fillRect(-20,-20,W+40,H+40);
  switch(state){
    case ST.TITLE: drawTitle(); break;
    case ST.CUT: drawCut(); break;
    case ST.WALK: drawWalk(); break;
    case ST.GAMEOVER: drawGameOver(); break;
    default: drawBattle();
  }
  if(flash>0){ctx.fillStyle='rgba(255,255,255,'+(flash/30)+')';ctx.fillRect(-20,-20,W+40,H+40);}
  // ミュート表示
  if(muted){ txt('♪×',W-22,8,14,'#555','right'); }
  ctx.restore();
}
function txt(s,x,y,size,color,align){ ctx.fillStyle=color||'#fff'; ctx.font=size+'px "Courier New",monospace'; ctx.textAlign=align||'left'; ctx.fillText(s,x,y); ctx.textAlign='left'; }
function drawImgCover(img,dark){ if(img&&img.complete&&img.naturalWidth){ const s=Math.max(W/img.naturalWidth,H/img.naturalHeight);
    const w=img.naturalWidth*s,h=img.naturalHeight*s; ctx.drawImage(img,(W-w)/2,(H-h)/2,w,h); }
  ctx.fillStyle='rgba(0,0,0,'+dark+')'; ctx.fillRect(0,0,W,H); }
function drawImgFit(img,cx,cy,maxw,maxh){ if(!img||!img.complete||!img.naturalWidth)return;
  const s=Math.min(maxw/img.naturalWidth,maxh/img.naturalHeight),w=img.naturalWidth*s,h=img.naturalHeight*s;
  ctx.drawImage(img,cx-w/2,cy-h/2,w,h); }

function drawTitle(){
  drawImgCover(IMG.title_bg,0.55);
  txt('やさしい地下',W/2,118,46,'#fff','center');
  txt('THE  GENTLE  UNDERGROUND',W/2,176,15,'#888','center');
  txt('だれも たおさなくて いい RPG。',W/2,250,18,'#ccc','center');
  txt('あいての HP では なく、こころを みる。',W/2,280,15,'#888','center');
  if(Math.floor(Date.now()/500)%2===0) txt('Z / Enter で はじめる',W/2,360,18,'#fff','center');
  txt('FIGHT   ACT   ITEM   MERCY',W/2,420,14,'#555','center');
  txt('M: 音楽 ON/OFF',W/2,446,12,'#444','center');
}
function drawCut(){
  drawImgCover(cut.img?IMG[cut.img]:null, cut.dark);
  // 文字ボックス
  const bx=40,by=H-150,bw=W-80,bh=110;
  ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(bx,by,bw,bh);
  ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.strokeRect(bx,by,bw,bh);
  ctx.fillStyle='#fff'; ctx.font='17px "Courier New",monospace'; ctx.textAlign='left';
  wrapText(cutText.substring(0,cutShown),bx+18,by+16,bw-36,24);
  if(cut.choice && cutShown>=cutText.length && cut.idx>=cut.pages.length-1){
    const sel=cut.choice.sel||0;
    txt('* '+cut.choice.q,bx+18,by-78,15,'#ff3','left');
    for(let i=0;i<cut.choice.opts.length;i++){ const yy=by-50+i*24;
      txt((i===sel?'> ':'  ')+cut.choice.opts[i].label,bx+30,yy,16,i===sel?'#ff3':'#aaa','left'); }
  } else if(cutShown>=cutText.length && Math.floor(Date.now()/400)%2===0){
    txt('▼',bx+bw-26,by+bh-28,16,'#fff','left');
  }
  // ページ数
  if(cut.pages.length>1) txt((cut.idx+1)+'/'+cut.pages.length,bx+bw-8,by-2,11,'#666','right');
}
function wrapText(text,x,y,maxw,lh){ let line='',yy=y;
  for(const ch of text){ if(ch==='\n'){ctx.fillText(line,x,yy);line='';yy+=lh;continue;}
    const test=line+ch; if(ctx.measureText(test).width>maxw){ctx.fillText(line,x,yy);line=(ch===' '?'':ch);yy+=lh;} else line=test; }
  ctx.fillText(line,x,yy); }

function drawBattle(){
  // 敵 画像
  if(enemy){ const sh=enemy.spareReady?0:(state===ST.ENEMY?Math.sin(bphase.t*0.3)*3:0);
    drawImgFit(IMG[enemy.key], W/2+sh, 130, 200, 180);
    const col=enemy.spareReady?'#ff3':'#fff';
    txt('* '+enemy.name+(enemy.spareReady?'   （みのがせる！）':''),W/2,232,17,col,'center'); }
  if(state===ST.DIALOG||state===ST.RESULT) drawDialogBox();
  else if(state===ST.ENEMY||state===ST.FIGHTBAR){ drawBox(); if(state===ST.ENEMY)drawBulletsAndSoul(); else drawFightBar(); }
  else { drawBox(); }
  drawHUD();
  if(state===ST.MENU)drawMenu();
  if(state===ST.SUB)drawSub();
}
function drawBox(){const b=bphase.box;ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.strokeRect(b.x,b.y,b.w,b.h);}
function drawBulletsAndSoul(){ const b=bphase.box; ctx.save(); ctx.beginPath(); ctx.rect(b.x-2,b.y-2,b.w+4,b.h+4); ctx.clip();
  for(const bl of bphase.bullets)bl.draw&&bl.draw(ctx); ctx.restore();
  if(soul.invuln%6<3)drawHeart(soul.x,soul.y,soul.invuln>0?'#a00':'#f00',5); }
function drawHeart(x,y,col,s){ s=s||5; ctx.fillStyle=col; ctx.beginPath();
  ctx.moveTo(x,y+s*0.7);
  ctx.bezierCurveTo(x,y-s*0.2,x-s,y-s*0.4,x-s,y+s*0.2);
  ctx.bezierCurveTo(x-s,y+s*0.9,x,y+s*1.1,x,y+s*1.5);
  ctx.bezierCurveTo(x,y+s*1.1,x+s,y+s*0.9,x+s,y+s*0.2);
  ctx.bezierCurveTo(x+s,y-s*0.4,x,y-s*0.2,x,y+s*0.7); ctx.fill(); }
function drawFightBar(){const b=bphase.box;
  ctx.strokeStyle='#ff3';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(b.x+b.w/2,b.y+8);ctx.lineTo(b.x+b.w/2,b.y+b.h-8);ctx.stroke();
  ctx.fillStyle='#fff';ctx.fillRect((fightBarLock<0?fightBarX:fightBarLock)-3,b.y+6,6,b.h-12);
  txt('Z で きる！(中央ほど 大ダメージ)',b.x+b.w/2,b.y+b.h+10,13,'#888','center');}
function drawDialogBox(){const b=bphase.box;ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.strokeRect(b.x,b.y,b.w,b.h);
  ctx.fillStyle='#fff';ctx.font='15px "Courier New",monospace';ctx.textAlign='left';
  wrapText('* '+dialogText.substring(0,dialogShown),b.x+12,b.y+14,b.w-24,20);
  if(state===ST.DIALOG&&dialogShown>=dialogText.length&&Math.floor(Date.now()/400)%2===0)txt('▼',b.x+b.w-22,b.y+b.h-26,16,'#fff');}
function drawMenu(){const y=H-70;
  for(let i=0;i<MENU.length;i++){const x=40+i*145,sel=(i===menuIndex);
    ctx.strokeStyle=sel?'#ff3':'#f80';ctx.lineWidth=2;ctx.strokeRect(x,y,130,40);
    txt(MENU[i],x+65,y+12,16,sel?'#ff3':'#fa3','center'); if(sel)drawHeart(x+14,y+20,'#f00',5);}}
function drawSub(){const b=bphase.box;ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.strokeRect(b.x,b.y,b.w,b.h);
  txt(subType==='act'?'* こうどう':subType==='item'?'* どうぐ':'* みのがす',b.x+12,b.y+8,14,'#aaa');
  for(let i=0;i<subOptions.length;i++){const yy=b.y+32+i*22,sel=(i===subIndex);
    txt(subOptions[i],b.x+34,yy,14,sel?'#ff3':'#fff'); if(sel)drawHeart(b.x+18,yy+7,'#f00',5);}
  txt('X: もどる',b.x+b.w-18,b.y+b.h-20,11,'#666','right');}
function drawHUD(){const y=H-20;
  txt(player.name,40,y-6,15,'#fff'); txt('LV '+player.lv,165,y-6,15,'#fff');
  const hx=240,hw=120; txt('HP',hx-30,y-6,13,'#fff');
  ctx.fillStyle='#a00';ctx.fillRect(hx,y-4,hw,14); ctx.fillStyle='#ff3';ctx.fillRect(hx,y-4,hw*Math.max(0,player.hp)/player.maxhp,14);
  txt(Math.max(0,player.hp)+' / '+player.maxhp,hx+hw+12,y-6,14,'#fff');}
function drawGameOver(){
  drawImgCover(null,1);
  txt('* あなたの こころが くだけた。',W/2,180,20,'#fff','center');
  txt('でも、あきらめないで。',W/2,220,16,'#aaa','center');
  drawHeart(W/2-12,140,'#f00',6); drawHeart(W/2+12,140,'#f00',6);
  if(Math.floor(Date.now()/500)%2===0)txt('Z で タイトルへ',W/2,320,16,'#fff','center');}

/* =======================  起動  ======================= */
function loop(){ update(); draw(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);
</script>
</body>
